<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Opening Instagram…</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<style>
  body { background:#000; color:#c9a84c; font-family:Georgia,serif; text-align:center; padding:40vh 20px 0; margin:0; }
@media print{*,*::before,*::after{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}#jtnav,.home-btn,.jsearch-float-btn,#jsearch-overlay,#j-update-banner,#sw-update-banner,#jtnav-mobile-overlay,.left-nav,.right-nav,.mob-nav,.mob-nav-grid,.hp-scroll-hint{display:none!important}h1,h2,h3,h4,h5,h6{page-break-after:avoid}img,.album-card,.merch-card,.photo-row,.entity-card,.blog-card{page-break-inside:avoid}}</style>
</head>
<body>
<p>Opening Instagram…</p>
<script>
(function(){
  var HANDLE = 'thejestamang';
  var webUrl = 'https://www.instagram.com/' + HANDLE + '/';
  var appUrl = 'instagram://user?username=' + HANDLE;
  var fallbackTimer = setTimeout(function(){
    window.location.href = webUrl;
  }, 1500);
  window.addEventListener('pagehide', function(){ clearTimeout(fallbackTimer); });
  window.addEventListener('blur',     function(){ clearTimeout(fallbackTimer); });
  window.location.href = appUrl;
})();
</script>
</body>
</html>
