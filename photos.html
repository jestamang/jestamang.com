function createSection(label,groupId,photos,flatList){const section=document.createElement('div');section.className='group-section';section.setAttribute('data-group',groupId);const title=document.createElement('div');title.className='group-title';title.textContent=label;section.appendChild(title);const grid=document.createElement('div');grid.className='photo-grid';photos.forEach((file,idx)=>{const item=document.createElement('div');item.className='photo-item';const img=document.createElement('img');img.src='assets/photos/'+file;img.alt=label+' '+(idx+1);img.loading='lazy';item.appendChild(img);item.addEventListener('click',()=>{openLightbox(flatList,idx);});grid.appendChild(item);});section.appendChild(grid);return section;}
function openLightbox(list,index){currentLightboxList=list;currentLightboxIndex=index;updateLightboxImage();document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
function updateLightboxImage(){document.getElementById('lightboxImg').src=currentLightboxList[currentLightboxIndex];}
function lightboxPrev(){currentLightboxIndex=(currentLightboxIndex-1+currentLightboxList.length)%currentLightboxList.length;updateLightboxImage();}
function lightboxNext(){currentLightboxIndex=(currentLightboxIndex+1)%currentLightboxList.length;updateLightboxImage();}
document.getElementById('tabs').addEventListener('click',e=>{const tab=e.target.closest('.tab');if(!tab)return;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');buildGallery(tab.dataset.group);});document.getElementById('lightboxClose').addEventListener('click',closeLightbox);document.getElementById('lightboxPrev').addEventListener('click',lightboxPrev);document.getElementById('lightboxNext').addEventListener('click',lightboxNext);document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox')){closeLightbox();}});document.addEventListener('keydown',e=>{if(!document.getElementById('lightbox').classList.contains('open'))return;if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')lightboxPrev();if(e.key==='ArrowRight')lightboxNext();});buildGallery('all');</script>
<style>.lazy-img{opacity:0;transition:opacity 0.4s ease}.lazy-img.lazy-visible{opacity:1}</style><script>(function(){var imgs=document.querySelectorAll("img[loading='lazy']");imgs.forEach(function(img){img.classList.add("lazy-img")});var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add("lazy-visible");obs.unobserve(e.target)}})},{rootMargin:"50px"});imgs.forEach(function(img){obs.observe(img)})})();</script>
