<style>
@font-face{font-family:'Luminari';src:url('assets/fonts/Luminari.ttf') format('truetype');font-display:swap}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Luminari',serif;background:#000;min-height:100vh;color:#f0e6d3;padding-top:52px;background-attachment:fixed;background-size:cover;background-position:center;}
#jt-bg{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;pointer-events:none;opacity:0.65;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.92) 100%);z-index:0;pointer-events:none;}
.admin-wrap{position:relative;z-index:1;max-width:580px;margin:0 auto;padding:52px 28px 100px;}
.admin-title{font-family:'Luminari',serif;font-size:clamp(1.3rem,4vw,2rem);letter-spacing:0.42em;text-transform:uppercase;color:#c9a84c;text-align:center;text-shadow:0 0 40px rgba(201,168,76,0.5),0 2px 12px rgba(0,0,0,1);margin-bottom:6px;}
.admin-sub{font-size:0.68rem;letter-spacing:0.28em;text-transform:uppercase;color:rgba(201,168,76,0.35);text-align:center;margin-bottom:40px;}
.gold-rule{width:60%;margin:0 auto 40px;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,0.5),transparent);}
.admin-card{background:rgba(8,5,2,0.92);border:1px solid rgba(201,168,76,0.22);border-radius:2px;padding:36px 32px;position:relative;}
.admin-card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,0.5),transparent);}
.field-label{display:block;font-size:0.68rem;letter-spacing:0.32em;text-transform:uppercase;color:rgba(201,168,76,0.6);margin-bottom:8px;margin-top:24px;}
.field-label:first-of-type{margin-top:0;}
.field-input{width:100%;background:rgba(5,3,1,0.95);border:1px solid rgba(201,168,76,0.2);color:#f0e6d3;font-family:'Luminari',serif;font-size:0.88rem;letter-spacing:0.04em;padding:11px 14px;outline:none;box-sizing:border-box;transition:border-color 0.2s;}
.field-input:focus{border-color:rgba(201,168,76,0.55);box-shadow:0 0 12px rgba(201,168,76,0.08);}
.field-textarea{min-height:90px;resize:vertical;line-height:1.6;}
.radio-group{display:flex;gap:24px;margin-top:4px;flex-wrap:wrap;}
.radio-label{display:flex;align-items:center;gap:8px;font-size:0.72rem;letter-spacing:0.14em;color:rgba(240,230,210,0.7);cursor:pointer;}
.radio-label input{accent-color:#c9a84c;width:15px;height:15px;cursor:pointer;}
.send-btn{width:100%;margin-top:32px;background:transparent;border:1px solid rgba(201,168,76,0.6);color:#c9a84c;font-family:'Luminari',serif;font-size:0.78rem;letter-spacing:0.38em;text-transform:uppercase;padding:16px 24px;cursor:pointer;transition:border-color 0.25s,box-shadow 0.25s,background 0.25s;}
.send-btn:hover{border-color:#c9a84c;box-shadow:0 0 24px rgba(201,168,76,0.25);background:rgba(201,168,76,0.06);}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;}
.send-status{text-align:center;margin-top:18px;font-size:0.72rem;letter-spacing:0.18em;min-height:22px;}
.send-status--ok{color:rgba(201,168,76,0.75);}
.send-status--err{color:rgba(251,56,56,0.7);}
.auth-gate{display:none;}
.notif-history{margin-top:40px;}
.history-title{font-size:0.72rem;letter-spacing:0.32em;text-transform:uppercase;color:rgba(201,168,76,0.4);margin-bottom:16px;border-bottom:1px solid rgba(201,168,76,0.1);padding-bottom:8px;}
.history-entry{font-size:0.72rem;color:rgba(240,230,210,0.5);letter-spacing:0.06em;padding:10px 0;border-bottom:1px solid rgba(201,168,76,0.06);line-height:1.6;}
.history-entry b{color:rgba(201,168,76,0.7);}
@media(max-width:600px){.admin-card{padding:24px 18px;}}
</style>

<div class="admin-wrap">
  <h1 class="admin-title">Admin Panel</h1>
  <div class="admin-sub">Jestamang — Transmission Control</div>
  <div class="gold-rule"></div>

  <!-- Auth gate message (shown while checking) -->
  <div id="auth-checking" style="text-align:center;color:rgba(201,168,76,0.35);font-size:0.7rem;letter-spacing:0.22em;">VERIFYING CLEARANCE...</div>

  <!-- Admin content (shown only to authorised email) -->
  <div id="admin-content" style="display:none;">
    <div class="admin-card">

      <label class="field-label" for="notif-title">Notification Title</label>
      <input class="field-input" id="notif-title" type="text" placeholder="NEW ALBUM DROPPING" maxlength="80">

      <label class="field-label" for="notif-body">Notification Body</label>
      <textarea class="field-input field-textarea" id="notif-body" placeholder="Available now on all platforms..." maxlength="200"></textarea>

      <label class="field-label" for="notif-link">Link (optional)</label>
      <input class="field-input" id="notif-link" type="text" placeholder="albums.html" maxlength="200">

      <label class="field-label">Send To</label>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="send-to" value="all" checked> All members
        </label>
        <label class="radio-label">
          <input type="radio" name="send-to" value="loggedin"> Logged-in members only
        </label>
      </div>

      <button class="send-btn" id="send-btn">Send Transmission</button>
      <div class="send-status" id="send-status"></div>
    </div>

    <!-- Recent notifications log -->
    <div class="notif-history">
      <div class="history-title">Recent Transmissions</div>
      <div id="notif-history-list"><div class="history-entry" style="color:rgba(201,168,76,0.2);">Loading...</div></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script>
(function () {
  'use strict';

  var ADMIN_EMAIL = 'andrewwace0319@gmail.com';
  var checkEl     = document.getElementById('auth-checking');
  var contentEl   = document.getElementById('admin-content');
  var sendBtn     = document.getElementById('send-btn');
  var statusEl    = document.getElementById('send-status');
  var historyEl   = document.getElementById('notif-history-list');

  // ── Auth gate ────────────────────────────────────────────────
  function waitForAuth() {
    var maxTries = 40; var tries = 0;
    var timer = setInterval(function () {
      tries++;
      if (window.jestaAuth || tries > maxTries) {
        clearInterval(timer);
        if (!window.jestaAuth) { redirect(); return; }
        window.jestaAuth.onAuthStateChanged(function (user) {
          checkEl.style.display = 'none';
          if (!user || user.email !== ADMIN_EMAIL) {
            redirect();
          } else {
            contentEl.style.display = 'block';
            loadHistory();
          }
        });
      }
    }, 100);
  }

  function redirect() { window.location.replace('index.html'); }

  // ── Send notification ────────────────────────────────────────
  if (sendBtn) {
    sendBtn.addEventListener('click', function () {
      var title   = (document.getElementById('notif-title').value  || '').trim();
      var body    = (document.getElementById('notif-body').value   || '').trim();
      var link    = (document.getElementById('notif-link').value   || '').trim();
      var sendTo  = document.querySelector('input[name="send-to"]:checked');
      sendTo = sendTo ? sendTo.value : 'all';

      if (!title) { statusEl.textContent = 'Title is required'; statusEl.className = 'send-status send-status--err'; return; }
      if (!body)  { statusEl.textContent = 'Body is required';  statusEl.className = 'send-status send-status--err'; return; }

      sendBtn.disabled = true;
      statusEl.textContent = '';

      window.jestaDB.collection('notifications').add({
        title:     title,
        body:      body,
        link:      link || '/',
        sendTo:    sendTo,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        sent:      false
      }).then(function () {
        statusEl.textContent = '✦ TRANSMISSION SENT ✦';
        statusEl.className   = 'send-status send-status--ok';
        document.getElementById('notif-title').value = '';
        document.getElementById('notif-body').value  = '';
        document.getElementById('notif-link').value  = '';
        sendBtn.disabled = false;
        loadHistory();
      }).catch(function (err) {
        statusEl.textContent = 'Error: ' + err.message;
        statusEl.className   = 'send-status send-status--err';
        sendBtn.disabled     = false;
      });
    });
  }

  // ── Load recent notification history ────────────────────────
  function loadHistory() {
    if (!window.jestaDB || !historyEl) return;
    window.jestaDB.collection('notifications')
      .orderBy('timestamp', 'desc').limit(10)
      .onSnapshot(function (snap) {
        if (snap.empty) { historyEl.innerHTML = '<div class="history-entry" style="color:rgba(201,168,76,0.2);">No transmissions yet.</div>'; return; }
        var html = '';
        snap.forEach(function (doc) {
          var d   = doc.data();
          var ts  = d.timestamp ? new Date(d.timestamp.toDate()).toLocaleString() : '—';
          var sent = d.sent ? '✦ sent' : '· pending';
          html += '<div class="history-entry"><b>' + (d.title || '—') + '</b> ' + sent + '<br>' + (d.body || '') + '<br><span style="color:rgba(201,168,76,0.3);font-size:0.65rem;">' + ts + ' · ' + (d.link || '/') + '</span></div>';
        });
        historyEl.innerHTML = html;
      }, function () {
        historyEl.innerHTML = '<div class="history-entry send-status--err">Could not load history.</div>';
      });
  }

  waitForAuth();
})();
</script>
