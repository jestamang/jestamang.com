<script>
var CARDS_DEFAULT = [
  {arcana:'I · The Jester',name:'The Jester',glyph:'Ψ',reading:'What is given freely multiplies. What is hoarded rots. The Jester sees your open hands and grins — this is the correct posture.'},
  {arcana:'II · Origin',name:'The Prickly Being',glyph:'✶',reading:'A small divine presence has left its marks on your chest. Do not wash them. They are proof of something most will never receive.'},
  {arcana:'III · Motion',name:'The Parade',glyph:'↯',reading:'Movement is the ritual. The direction matters less than the act of beginning. Set your feet in motion — the path reveals itself under moving feet.'},
  {arcana:'IV · Season',name:'The New Æon',glyph:'Æ',reading:'The old season does not argue with the new one. It simply yields. Something in you is ready to yield. Let it.'},

var TWENTY_FOUR = 24 * 60 * 60 * 1000;
var _countdownTimer = null;
var _nextSigilTimer = null;
var _currentCardIdx = null;

/* ── Web Audio ── */
var _audioCtx = null;
function _getAudioCtx(){
  if(!_audioCtx){try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  return _audioCtx;
}
function _playTone(freq1,freq2,duration,type){
  var ctx=_getAudioCtx();if(!ctx)return;
  try{
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type=type||'sine';
    osc.frequency.setValueAtTime(freq1,ctx.currentTime);
    if(freq2)osc.frequency.linearRampToValueAtTime(freq2,ctx.currentTime+duration);
    gain.gain.setValueAtTime(0.18,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+duration);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+duration);
  }catch(e){}
}
function _playChord(){
  var ctx=_getAudioCtx();if(!ctx)return;
  var freqs=[261.63,329.63,392];// C4, E4, G4
  freqs.forEach(function(f){
    try{
      var osc=ctx.createOscillator();var gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';osc.frequency.value=f;
      gain.gain.setValueAtTime(0.1,ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.4);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);
    }catch(e){}
  });
}
function _playTick(){_playTone(800,800,0.06,'sine');}

/* ── Particles ── */
function burstParticles(sourceEl){
  var rect=sourceEl.getBoundingClientRect();
  var cx=rect.left+rect.width/2;
  var cy=rect.top+rect.height/2;
  var count=18;
  for(var i=0;i<count;i++){
    (function(i){
      var p=document.createElement('div');
      p.className='oracle-particle';
      p.style.left=cx+'px';
      p.style.top=cy+'px';
      document.body.appendChild(p);
      var angle=(360/count)*i*(Math.PI/180);
      var dist=80+Math.random()*80;
      var tx=Math.cos(angle)*dist;
      var ty=Math.sin(angle)*dist;
      var delay=Math.random()*0.1;
      p.style.transition='transform '+(0.7+Math.random()*0.2)+'s cubic-bezier(0.2,0,1,1) '+delay+'s, opacity 0.8s ease '+delay+'s';
      p.style.opacity='1';
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          p.style.transform='translate('+tx+'px,'+ty+'px)';
          p.style.opacity='0';
        });
      });
      setTimeout(function(){if(p.parentNode)p.parentNode.removeChild(p);},(0.9+delay)*1000);
    })(i);
  }
}

/* ── Streak ── */
function getStreakData(){
  try{
    var d=JSON.parse(localStorage.getItem('sigilStreak')||'null');
    return d||{streak:0,lastDate:null};
  }catch(e){return{streak:0,lastDate:null};}
}
function updateStreak(){
  var today=new Date();
  var todayStr=today.getFullYear()+'-'+(today.getMonth()+1)+'-'+today.getDate();
  var data=getStreakData();
  if(data.lastDate===todayStr)return data.streak;
  var yesterday=new Date(today);yesterday.setDate(yesterday.getDate()-1);
  var yStr=yesterday.getFullYear()+'-'+(yesterday.getMonth()+1)+'-'+yesterday.getDate();
  var newStreak=(data.lastDate===yStr)?data.streak+1:1;
  localStorage.setItem('sigilStreak',JSON.stringify({streak:newStreak,lastDate:todayStr}));
  return newStreak;
}
function showStreak(){
  var data=getStreakData();
  var el=document.getElementById('streak-display');
  if(data.streak>0){
    el.textContent='✦ '+data.streak+'-DAY STREAK';
  } else {
    el.innerHTML='&nbsp;';
  }
}

/* ── Next sigil countdown ── */
function getMidnightCountdown(){
  var now=new Date();
  var midnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,0,0);
  var ms=midnight-now;
  if(ms<=0)return null;
  var h=Math.floor(ms/3600000);
  var m=Math.floor((ms%3600000)/60000);
  return'Next sigil in: '+h+'h '+m+'m';
}
function startNextSigilTimer(){
  clearInterval(_nextSigilTimer);
  var el=document.getElementById('next-sigil');
  function tick(){
    var t=getMidnightCountdown();
    el.textContent=t||'';
  }
  tick();
  _nextSigilTimer=setInterval(tick,60000);
}

/* ── Fill card ── */
function fillCard(idx){
  var c=ACTIVE_CARDS[idx];
  document.getElementById('c-arcana').textContent=c.arcana;
  document.getElementById('c-name').textContent=c.name;
  document.getElementById('c-glyph').textContent=c.glyph;
  document.getElementById('c-reading').textContent=c.reading;
  document.getElementById('reading-parchment-text').textContent=c.reading;
  _currentCardIdx=idx;
}

/* ── Countdown (24h lock) ── */
function getCountdownText(drawTime){
  var remaining=TWENTY_FOUR-(Date.now()-drawTime);
  if(remaining<=0)return null;
  var totalMins=Math.floor(remaining/60000);
  var h=Math.floor(totalMins/60);
  var m=totalMins%60;
  return'RETURN IN '+h+(h!==1?' HOURS':' HOUR')+' · '+m+(m!==1?' MINUTES':' MINUTE');
}
function startCountdown(drawTime){
  clearInterval(_countdownTimer);
  var el=document.getElementById('drawn-count');
  function tick(){
    var txt=getCountdownText(drawTime);
    if(!txt){clearInterval(_countdownTimer);showDrawState();return;}
    el.textContent=txt;
  }
  tick();
  _countdownTimer=setInterval(tick,60000);
}

/* ── Show parchment ── */
function showParchment(){
  var p=document.getElementById('reading-parchment');
  p.style.display='block';
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      p.classList.add('visible');
    });
  });
}
function hideParchment(){
  var p=document.getElementById('reading-parchment');
  p.classList.remove('visible');
  setTimeout(function(){p.style.display='none';},500);
}

/* ── State: locked ── */
function showLockedState(idx,drawTime){
  document.getElementById('oracle-title').textContent='YOUR SIGIL HAS BEEN CAST';
  document.getElementById('oracle-sub').textContent='Your card for today has been drawn';
  document.getElementById('draw-btn').style.display='none';
  fillCard(idx);
  var ocard=document.getElementById('oracle-card');
  if(!ocard.classList.contains('revealed'))ocard.classList.add('revealed');
  startCountdown(drawTime);
  startNextSigilTimer();
  showStreak();
  showParchment();
  document.getElementById('share-btn').classList.add('show');
}

/* ── State: draw ── */
function showDrawState(){
  clearInterval(_countdownTimer);
  clearInterval(_nextSigilTimer);
  document.getElementById('oracle-title').textContent='THE ORACLE AWAITS';
  document.getElementById('oracle-sub').textContent='Draw from the deck of the Jestamang Universe';
  document.getElementById('drawn-count').innerHTML='&nbsp;';
  document.getElementById('next-sigil').innerHTML='&nbsp;';
  document.getElementById('streak-display').innerHTML='&nbsp;';
  document.getElementById('draw-btn').style.display='';
  document.getElementById('draw-btn').disabled=false;
  document.getElementById('share-btn').classList.remove('show');
  var ocard=document.getElementById('oracle-card');
  ocard.classList.remove('revealed');
  document.getElementById('c-arcana').innerHTML='&nbsp;';
  document.getElementById('c-name').innerHTML='&nbsp;';
  document.getElementById('c-glyph').innerHTML='&nbsp;';
  document.getElementById('c-reading').innerHTML='&nbsp;';
  hideParchment();
  _currentCardIdx=null;
}

/* ── Lock draw ── */
function lockDraw(idx){
  var now=Date.now();
  localStorage.setItem('sigilLastDraw',now.toString());
  localStorage.setItem('sigilLastCard',idx.toString());
  updateStreak();
  document.getElementById('oracle-title').textContent='YOUR SIGIL HAS BEEN CAST';
  document.getElementById('oracle-sub').textContent='Your card for today has been drawn';
  document.getElementById('draw-btn').style.display='none';
  startCountdown(now);
  startNextSigilTimer();
  showStreak();
}

/* ── Firebase sync ── */
function syncToFirestore(idx,drawTs){
  try{
    var db=window.jestaDB;
    var user=window.jestaAuth&&window.jestaAuth.currentUser;
    if(!db||!user)return;
    db.collection('users').doc(user.uid).set({sigilLastDraw:drawTs,sigilLastCard:idx},{merge:true})
      .catch(function(e){console.warn('sigil:fs write',e);});
  }catch(e){}
}

/* ── Draw button ── */
var _drawBtn=document.getElementById('draw-btn');if(_drawBtn)_drawBtn.addEventListener('click',function(){
  var btn=this;
  if(btn.disabled)return;
  btn.disabled=true;
  var idx=Math.floor(Math.random()*ACTIVE_CARDS.length);
  fillCard(idx);
  // Play flip sound: low sweep 200→400Hz over 0.8s
  _playTone(200,400,0.8,'sine');
  var ocard=document.getElementById('oracle-card');
  // Add shimmer animation on the card element
  ocard.classList.add('flip-shimmer');
  setTimeout(function(){
    ocard.classList.add('revealed');
    // After flip completes, play reveal chord and burst particles
    setTimeout(function(){
      _playChord();
      burstParticles(ocard);
      showParchment();
      document.getElementById('share-btn').classList.add('show');
      lockDraw(idx);
      syncToFirestore(idx,parseInt(localStorage.getItem('sigilLastDraw')));
      setTimeout(function(){ocard.classList.remove('flip-shimmer');},100);
    },800);
  },60);
});

/* ── Share button ── */
var _shareBtn=document.getElementById('share-btn');if(_shareBtn)_shareBtn.addEventListener('click',function(){
  var btn=this;
  if(_currentCardIdx===null)return;
  var card=ACTIVE_CARDS[_currentCardIdx];
  var shortReading=card.reading.split('.')[0]+'.';
  var text='My Daily Sigil on jestamang.com: '+card.name+' — '+shortReading;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      _playTick();
      var orig=btn.textContent;
      btn.textContent='COPIED ✦';
      setTimeout(function(){btn.textContent=orig;},2000);
    }).catch(function(){_shareFallback(text,btn);});
  }else{
    _shareFallback(text,btn);
  }
});
function _shareFallback(text,btn){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
  _playTick();
  var orig=btn.textContent;
  btn.textContent='COPIED ✦';
  setTimeout(function(){btn.textContent=orig;},2000);
}

/* ── Load cards from Firestore, fall back to defaults ── */
var ACTIVE_CARDS = null;

function loadSigilCards(callback) {
  var _jt = 0, _jiv = setInterval(function() {
    if (window.jestaDB) {
      clearInterval(_jiv);
      window.jestaDB.collection('sigilCards').doc('cards').get()
        .then(function(doc) {
          if (doc.exists && doc.data().cards && doc.data().cards.length > 0) {
            callback(doc.data().cards);
          } else {
            callback(CARDS_DEFAULT);
          }
        })
        .catch(function() { callback(CARDS_DEFAULT); });
      return;
    }
    if (++_jt > 80) { clearInterval(_jiv); callback(CARDS_DEFAULT); }
  }, 100);
}

/* ── Init ── */
function initOracle() {
  var lastDraw=localStorage.getItem('sigilLastDraw');
  var lastCard=localStorage.getItem('sigilLastCard');
  if(lastDraw&&lastCard!==null&&(Date.now()-parseInt(lastDraw))<TWENTY_FOUR){
    showLockedState(parseInt(lastCard),parseInt(lastDraw));
  }else{
    showDrawState();
  }
}

loadSigilCards(function(cards) {
  ACTIVE_CARDS = cards;
  initOracle();
});

/* ── Firestore sync ── */
document.addEventListener('DOMContentLoaded',function(){
  var authPoll=setInterval(function(){
    if(!window.jestaAuth)return;
    clearInterval(authPoll);
    window.jestaAuth.onAuthStateChanged(function(user){
      if(!user||!window.jestaDB)return;
      window.jestaDB.collection('users').doc(user.uid).get().then(function(doc){
        if(!doc.exists)return;
        var d=doc.data();
        if(d.sigilLastDraw==null||d.sigilLastCard==null)return;
        var fsTs=d.sigilLastDraw,fsCard=d.sigilLastCard;
        var localTs=parseInt(localStorage.getItem('sigilLastDraw')||'0');
        if(fsTs>localTs){
          localStorage.setItem('sigilLastDraw',fsTs.toString());
          localStorage.setItem('sigilLastCard',fsCard.toString());
          if((Date.now()-fsTs)<TWENTY_FOUR){
            showLockedState(fsCard,fsTs);
          }else{
            showDrawState();
          }
        }
      }).catch(function(e){console.warn('sigil:fs read',e);});
    });
  },100);
});
