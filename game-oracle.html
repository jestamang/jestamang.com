<script>
var CARDS_DEFAULT = [
  {arcana:'I · The Jester',name:'The Jester',glyph:'Ψ',reading:'What is given freely multiplies. What is hoarded rots. The Jester sees your open hands and grins — this is the correct posture.'},
  {arcana:'II · Origin',name:'The Prickly Being',glyph:'✶',reading:'A small divine presence has left its marks on your chest. Do not wash them. They are proof of something most will never receive.'},
  {arcana:'III · Motion',name:'The Parade',glyph:'↯',reading:'Movement is the ritual. The direction matters less than the act of beginning. Set your feet in motion — the path reveals itself under moving feet.'},
  {arcana:'IV · Season',name:'The New Æon',glyph:'Æ',reading:'The old season does not argue with the new one. It simply yields. Something in you is ready to yield. Let it.'},
  {arcana:'V · Signal',name:'The Metropolis',glyph:'⌘',reading:'The city speaks to those who have learned its dialect. What sounds like noise to others is transmission to you. Listen deeper.'},
  {arcana:'VI · Whole',name:'The 600',glyph:'⊛',reading:'The number is not large — it is complete. One contains the whole. You already hold everything required for this moment.'},
  {arcana:'VII · Freedom',name:'The Circus',glyph:'Ω',reading:'Your cage was assembled from your own hesitation. The door was never locked. You simply forgot to check.'},
  {arcana:'VIII · Sleep',name:'The Dream',glyph:'≋',reading:'What visited you while you slept was not imaginary. The frenzied realm of dreams is where the real work is done.'},
  {arcana:'IX · Depth',name:'The Swamp',glyph:'∿',reading:'From the murk rise the most vivid creatures. The clarity you seek is not found in clean water — it is found in depth.'},

  {arcana:'XIII · Time',name:'The Rhythm',glyph:'⌁',reading:'Every soul moves in time whether it hears the music or not. The question is not whether you are dancing — it is whether you know it.'},
  {arcana:'XIV · Light',name:'The Gold',glyph:'◊',reading:'Not all that shines asks to be spent. Some things are kept luminous simply by being witnessed. Bear witness today.'},
  {arcana:'XV · Mark',name:'The Claws',glyph:'⍟',reading:'The small marks on your chest are not wounds — they are signatures. Something vast has signed its name into your skin.'},
  {arcana:'XVI · Unseen',name:'The Veil',glyph:'≀',reading:'What you cannot see is watching with tremendous interest. This is not threat. This is the most affectionate form of attention there is.'},
  {arcana:'XVII · Rite',name:'The Pagan',glyph:'⊗',reading:'No institution owns your ceremony. No government holds the patent on your reverence. The rite you build yourself is the only holy one.'},
  {arcana:'XVIII · Memory',name:'The Blood',glyph:'⌇',reading:'The wound remembers what the mind chooses to forget. What pulses in you is older than your name and wiser than your fear.'},
  {arcana:'XIX · Mirror',name:'The Fat Head',glyph:'⊙',reading:'The jesting being grins when you call it deity. But you are right to call it so. Feed it no further flattery — it has quite enough already.'},
  {arcana:'XX · Witness',name:'The Children',glyph:'⁕',reading:'Core 6. Chosen few. Born from the dew of a swampy imagination. They do not ask to be understood — only witnessed. Are you watching?'},
  {arcana:'XXI · Fire',name:'The Circus Spits',glyph:'⁑',reading:'Free, free, FREE! Marvelous — miraculous — meticulous creations beyond the limits of those fussy gods. Today you are one of them. Create without a single shred of doubt.'},

var TWENTY_FOUR = 24 * 60 * 60 * 1000;
var _nextSigilTimer = null;
var _currentCardIdx = null;

/* ── Web Audio ── */
var _audioCtx = null;
function _getAudioCtx(){
  if(!_audioCtx){try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  return _audioCtx;
}
function _playTone(freq1,freq2,duration,type){
  var ctx=_getAudioCtx();if(!ctx)return;
  try{
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type=type||'sine';
    osc.frequency.setValueAtTime(freq1,ctx.currentTime);
    if(freq2)osc.frequency.linearRampToValueAtTime(freq2,ctx.currentTime+duration);
    gain.gain.setValueAtTime(0.18,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+duration);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+duration);
  }catch(e){}
}
function _playChord(){
  var ctx=_getAudioCtx();if(!ctx)return;
  var freqs=[261.63,329.63,392];// C4, E4, G4
  freqs.forEach(function(f){
    try{
      var osc=ctx.createOscillator();var gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';osc.frequency.value=f;
      gain.gain.setValueAtTime(0.1,ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.4);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);
    }catch(e){}
  });
}

/* ── Particles ── */
function burstParticles(sourceEl){
  var rect=sourceEl.getBoundingClientRect();
  var cx=rect.left+rect.width/2;
  var cy=rect.top+rect.height/2;
  var count=18;
  for(var i=0;i<count;i++){
    (function(i){
      var p=document.createElement('div');
      p.className='oracle-particle';
      p.style.left=cx+'px';
      p.style.top=cy+'px';
      document.body.appendChild(p);
      var angle=(360/count)*i*(Math.PI/180);
      var dist=80+Math.random()*80;
      var tx=Math.cos(angle)*dist;
      var ty=Math.sin(angle)*dist;
      var delay=Math.random()*0.1;
      p.style.transition='transform '+(0.7+Math.random()*0.2)+'s cubic-bezier(0.2,0,1,1) '+delay+'s, opacity 0.8s ease '+delay+'s';
      p.style.opacity='1';
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          p.style.transform='translate('+tx+'px,'+ty+'px)';
          p.style.opacity='0';
        });
      });
      setTimeout(function(){if(p.parentNode)p.parentNode.removeChild(p);},(0.9+delay)*1000);
    })(i);
  }
}

/* ── Streak ── */
function getStreakData(){
  try{
    var d=JSON.parse(localStorage.getItem('sigilStreak')||'null');
    return d||{streak:0,lastDate:null};
  }catch(e){return{streak:0,lastDate:null};}
}
function updateStreak(){
  var today=new Date();
  var todayStr=today.getFullYear()+'-'+(today.getMonth()+1)+'-'+today.getDate();
  var data=getStreakData();
  if(data.lastDate===todayStr)return data.streak;
  var yesterday=new Date(today);yesterday.setDate(yesterday.getDate()-1);
  var yStr=yesterday.getFullYear()+'-'+(yesterday.getMonth()+1)+'-'+yesterday.getDate();
  var newStreak=(data.lastDate===yStr)?data.streak+1:1;
  try{localStorage.setItem('sigilStreak',JSON.stringify({streak:newStreak,lastDate:todayStr}));}catch(e){}
  return newStreak;
}
function showStreak(){
  var data=getStreakData();
  var el=document.getElementById('streak-display');
  if(data.streak>0){
    el.textContent='✦ '+data.streak+'-DAY STREAK';
  } else {
    el.innerHTML='&nbsp;';
  }
}

/* ── Next sigil countdown ── */
function getMidnightCountdown(){
  var now=new Date();
  var midnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,0,0);
  var ms=midnight-now;
  if(ms<=0)return null;
  var h=Math.floor(ms/3600000);
  var m=Math.floor((ms%3600000)/60000);
  return'Next sigil in: '+h+'h '+m+'m';
}
function startNextSigilTimer(){
  clearInterval(_nextSigilTimer);
  var el=document.getElementById('next-sigil');
  function tick(){
    var t=getMidnightCountdown();
    el.textContent=t||'';
  }
  tick();
  _nextSigilTimer=setInterval(tick,60000);
}

/* ── Share button — generates PNG of the drawn sigil card ── */
function buildSigilPNG(onDone){
  if(_currentCardIdx===null){onDone(null,'No card drawn');return;}
  var card=ACTIVE_CARDS[_currentCardIdx];
  var SCALE=2,CW=260*SCALE,CH=380*SCALE,CAP=60*SCALE,PAD=20*SCALE;
  function draw(){
    var canvas=document.createElement('canvas');
    canvas.width=CW;canvas.height=CH+CAP;
    var ctx=canvas.getContext('2d');
    ctx.fillStyle='rgb(6,2,1)';ctx.fillRect(0,0,CW,CH+CAP);
    ctx.strokeStyle='rgba(201,168,76,0.3)';ctx.lineWidth=SCALE;
    ctx.strokeRect(SCALE/2,SCALE/2,CW-SCALE,CH-SCALE);
    ctx.textAlign='center';
    // Arcana section
    var arcY1=PAD,arcY2=PAD+30,arcTextY=(arcY1+arcY2)/2+7;
    ctx.strokeStyle='rgba(201,168,76,0.15)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD,arcY1);ctx.lineTo(CW-PAD,arcY1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(PAD,arcY2);ctx.lineTo(CW-PAD,arcY2);ctx.stroke();
    ctx.font=(9*SCALE)+'px Luminari,Georgia,serif';
    ctx.fillStyle='rgba(201,168,76,0.5)';
    ctx.fillText((card.arcana||'').toUpperCase(),CW/2,arcTextY);
    // Card name
    ctx.font='bold '+(17*SCALE)+'px Luminari,Georgia,serif';
    ctx.fillStyle='#c9a84c';
    ctx.fillText(card.name||'',CW/2,arcY2+36);
    // Glyph
    ctx.font=(16*SCALE)+'px Georgia,"Times New Roman",serif';
    ctx.fillStyle='rgba(201,168,76,0.55)';
    ctx.fillText(card.glyph||'',CW/2,arcY2+72);
    // Rule gradient
    var ruleY=arcY2+90;
    var grad=ctx.createLinearGradient(CW/2-50,0,CW/2+50,0);
    grad.addColorStop(0,'rgba(201,168,76,0)');grad.addColorStop(0.5,'rgba(201,168,76,0.5)');grad.addColorStop(1,'rgba(201,168,76,0)');
    ctx.strokeStyle=grad;ctx.lineWidth=SCALE;
    ctx.beginPath();ctx.moveTo(CW/2-50,ruleY);ctx.lineTo(CW/2+50,ruleY);ctx.stroke();
    // Reading text (word-wrapped)
    var readY=ruleY+22,lineH=28;
    ctx.font='italic '+(9*SCALE)+'px Luminari,Georgia,serif';
    ctx.fillStyle='rgba(240,228,208,0.85)';
    var maxW=CW-PAD*2;
    var words=(card.reading||'').split(' '),lines=[],line='';
    for(var wi=0;wi<words.length;wi++){
      var test=line?line+' '+words[wi]:words[wi];
      if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=words[wi];}else{line=test;}
    }
    if(line)lines.push(line);
    var sigY=CH-22,maxLines=Math.floor((sigY-readY)/lineH);
    lines=lines.slice(0,maxLines);
    for(var li=0;li<lines.length;li++){ctx.fillText(lines[li],CW/2,readY+lineH*(li+1));}
    // Signature
    ctx.font=(6*SCALE)+'px Luminari,Georgia,serif';
    ctx.fillStyle='rgba(201,168,76,0.3)';
    ctx.fillText('— the oracle of jestamang',CW/2,sigY);
    // Caption divider + watermark
    ctx.strokeStyle='rgba(201,168,76,0.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(CW*0.25,CH+16*SCALE);ctx.lineTo(CW*0.75,CH+16*SCALE);ctx.stroke();
    ctx.font=(9*SCALE)+'px Georgia,serif';
    ctx.fillStyle='rgba(201,168,76,0.25)';
    ctx.fillText('jestamang.com',CW/2,CH+CAP-14*SCALE);
    canvas.toBlob(function(blob){onDone(blob,blob?null:'canvas.toBlob failed');},'image/png');
  }
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(draw);}else{draw();}
}
function _downloadSigilPNG(blob,name){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='jestamang-sigil-'+(name||'card')+'.png';
  a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);},10000);
}
function _copySigilToClipboard(blob,name,btn,orig){
  try{
    navigator.clipboard.write([new ClipboardItem({'image/png':blob})])
      .then(function(){if(btn){btn.textContent='COPIED ❖';setTimeout(function(){btn.textContent=orig;},2000);}})
      .catch(function(){_downloadSigilPNG(blob,name);});
  }catch(e){_downloadSigilPNG(blob,name);}
}
var _shareBtn=document.getElementById('share-btn');if(_shareBtn)_shareBtn.addEventListener('click',function(){
  var btn=this;
  if(_currentCardIdx===null)return;
  btn.disabled=true;
  var orig=btn.textContent;
  btn.textContent='PREPARING…';
  var card=ACTIVE_CARDS[_currentCardIdx];
  var safeName=(card.name||'sigil').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  buildSigilPNG(function(blob,err){
    if(!blob){btn.disabled=false;btn.textContent=orig;return;}
    var file=new File([blob],'jestamang-sigil-'+safeName+'.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'My Daily Sigil — '+card.name,text:'Drew '+card.name+' from the Jestamang Oracle — jestamang.com'})
        .then(function(){btn.disabled=false;btn.textContent=orig;})
        .catch(function(e){btn.disabled=false;btn.textContent=orig;if(e.name!=='AbortError')_copySigilToClipboard(blob,safeName,btn,orig);});
    }else if(navigator.clipboard&&window.ClipboardItem){
      btn.disabled=false;btn.textContent=orig;
      _copySigilToClipboard(blob,safeName,btn,orig);
    }else{
      btn.disabled=false;btn.textContent=orig;
      _downloadSigilPNG(blob,safeName);
    }
  });
});

/* ── Load cards from Firestore, fall back to defaults ── */
var ACTIVE_CARDS = null;

function loadSigilCards(callback) {
  var _jt = 0, _jiv = setInterval(function() {
    if (window.jestaDB) {
      clearInterval(_jiv);
      window.jestaDB.collection('sigilCards').doc('cards').get()
        .then(function(doc) {
          if (doc.exists && doc.data().cards && doc.data().cards.length > 0) {
            callback(doc.data().cards);
          } else {
            callback(CARDS_DEFAULT);
          }
        })
        .catch(function() { callback(CARDS_DEFAULT); });
      return;
    }
    if (++_jt > 80) { clearInterval(_jiv); callback(CARDS_DEFAULT); }
  }, 100);
}

/* ── Init ── */
function initOracle() {
  var lastDraw=localStorage.getItem('sigilLastDraw');
  var lastCard=localStorage.getItem('sigilLastCard');
  if(lastDraw&&lastCard!==null&&(Date.now()-parseInt(lastDraw))<TWENTY_FOUR){
    showLockedState(parseInt(lastCard),parseInt(lastDraw));
  }else{
    showDrawState();
  }
}

loadSigilCards(function(cards) {
  ACTIVE_CARDS = cards;
  initOracle();
});

document.addEventListener('DOMContentLoaded',function(){
  var authPoll=setInterval(function(){
    if(!window.jestaAuth)return;
    clearInterval(authPoll);
    window.jestaAuth.onAuthStateChanged(function(user){
      if(!user||!window.jestaDB)return;
      window.jestaDB.collection('users').doc(user.uid).get().then(function(doc){
        if(!doc.exists)return;
        var d=doc.data();
        if(d.sigilLastDraw==null||d.sigilLastCard==null)return;
        var fsTs=d.sigilLastDraw,fsCard=d.sigilLastCard;
        var localTs=parseInt(localStorage.getItem('sigilLastDraw')||'0');
        if(fsTs>localTs){
          try{localStorage.setItem('sigilLastDraw',fsTs.toString());}catch(e){}
          try{localStorage.setItem('sigilLastCard',fsCard.toString());}catch(e){}
          if((Date.now()-fsTs)<TWENTY_FOUR){
            showLockedState(fsCard,fsTs);
          }else{
            showDrawState();
          }
        }
      }).catch(function(e){console.warn('sigil:fs read',e);});
    });
  },100);
});
