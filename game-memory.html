<script>
var ALBUMS = [
  {title:'Zodiac', src:'assets/albums/QUARTER DAYS/children/qu01.jpg'},
  {title:'New \u00C6on', src:'assets/albums/QUARTER DAYS/kek-buh/qu02.jpg'},
  {title:'Niga Denots', src:'assets/albums/QUARTER DAYS/ace of chase/qu03.jpg'},
  {title:'Jestress Melody', src:'assets/albums/QUARTER DAYS/cricket om/qu04.jpg'},
  {title:'The Naples Society', src:'assets/albums/2K2323/jr mason/2k2323jan.jpg'},
  {title:'Peter Thy Godfather', src:'assets/albums/2K2323/father p journee/2k2323feb.jpg'},
  {title:'Covers the Taste', src:'assets/albums/2K2323/blue jays/2k2323mar.jpg'},
  {title:'Sleep Cycle', src:'assets/albums/2K2323/mutt tour/2k2323apr.jpg'}
];

var moves=0,pairs=0,secs=0,started=false,locked=false,first=null,second=null,ticker=null;

function pad(n){return n<10?'0'+n:n}
function tick(){secs++;document.getElementById('s-time').textContent=Math.floor(secs/60)+':'+pad(secs%60)}
function upd(){document.getElementById('s-moves').textContent=moves;document.getElementById('s-pairs').textContent=pairs+' / 8'}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

function build(){
  clearInterval(ticker);
  moves=0;pairs=0;secs=0;started=false;locked=false;first=null;second=null;
  document.getElementById('s-time').textContent='0:00';
  upd();
  document.getElementById('win-overlay').classList.remove('show');
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  var deck=shuffle(ALBUMS.concat(ALBUMS.map(function(a){return{title:a.title,src:a.src}})));
  deck.forEach(function(album){
    var card=document.createElement('div');
    card.className='mem-card';
    card.dataset.id=album.title;
    card.innerHTML='<div class="mem-card-inner"><div class="mem-back"><div class="mem-back-glyph">\u2726</div><div class="mem-back-text">Jestamang</div></div><div class="mem-front"><img src="'+album.src+'" alt="'+album.title+'" loading="lazy"></div></div>';
    card.addEventListener('click',function(){flip(card)});
    grid.appendChild(card);
  });
}

function flip(card){
  if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  if(!started){started=true;ticker=setInterval(tick,1000)}
  card.classList.add('flipped');
  if(!first){first=card;return}
  second=card;
  locked=true;
  moves++;upd();
  if(first.dataset.id===second.dataset.id){
    first.classList.add('matched');second.classList.add('matched');
    pairs++;upd();
    first=null;second=null;locked=false;
    if(pairs===8)setTimeout(win,600);
  } else {
    var a=first,b=second;
    first=null;second=null;
    setTimeout(function(){a.classList.remove('flipped');b.classList.remove('flipped');locked=false},950);
  }
}

function win(){
  clearInterval(ticker);
  var m=Math.floor(secs/60),s=secs%60;
  document.getElementById('win-stat-txt').textContent=moves+' moves  ·  '+m+':'+pad(s);
  document.getElementById('win-overlay').classList.add('show');
}

document.getElementById('btn-restart').addEventListener('click',build);
document.getElementById('btn-again').addEventListener('click',build);
build();
</script>

function jSearchClose(){var o=document.getElementById('jsearch-overlay');if(o){o.classList.remove('jsearch-open');document.body.style.overflow='';}}
function jHL(text,q){if(!q)return text.replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});var safe=text.replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});var tokens=q.trim().toLowerCase().split(/\s+/).filter(Boolean);tokens.forEach(function(tok){var re=new RegExp('('+tok.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');safe=safe.replace(re,'<mark>$1</mark>');});return safe;}
function jSearchRender(q){var box=document.getElementById('jsearch-results');if(!box)return;if(!q.trim()){box.innerHTML='<div class="jsearch-hint">ENTER A NAME &nbsp;\u00b7&nbsp; PAGE &nbsp;\u00b7&nbsp; ALBUM &nbsp;\u00b7&nbsp; ENTITY</div>';return;}var tokens=q.trim().toLowerCase().split(/\s+/).filter(Boolean);var scored=[];IDX.forEach(function(e){var nl=e.n.toLowerCase();var tl=(e.t||'').toLowerCase();var score=0;tokens.forEach(function(tok){if(nl===tok)score+=100;else if(nl.startsWith(tok))score+=50;else if(nl.indexOf(tok)!==-1)score+=30;if(tl.indexOf(tok)!==-1)score+=10;});if(score>0)scored.push({e:e,s:score});});scored.sort(function(a,b){return b.s-a.s;});scored=scored.slice(0,8);if(!scored.length){box.innerHTML='<div class="jsearch-empty">NO TRANSMISSIONS FOUND</div>';return;}var html='';scored.forEach(function(r){var e=r.e;html+='<a class="jsearch-item" href="'+e.u+'" onclick="jSearchClose()"><span class="jsearch-item-icon">'+e.i+'</span><span class="jsearch-item-name">'+jHL(e.n,q)+'</span><span class="jsearch-item-cat">'+e.c+'</span></a>';});box.innerHTML=html;}
document.addEventListener('DOMContentLoaded',function(){var inp=document.getElementById('jsearch-input');var closeBtn=document.getElementById('jsearch-close');var overlay=document.getElementById('jsearch-overlay');if(inp)inp.addEventListener('input',function(){jSearchRender(this.value);});if(closeBtn)closeBtn.addEventListener('click',jSearchClose);if(overlay)overlay.addEventListener('click',function(e){if(e.target===overlay)jSearchClose();});document.addEventListener('keydown',function(e){if(e.key==='Escape')jSearchClose();if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();jSearchOpen();}});});
