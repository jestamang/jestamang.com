*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{--game-header-h:60px}
#game-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;border-bottom:1px solid rgba(var(--gold-rgb,201,168,76),0.12);position:relative;min-height:var(--game-header-h)}

.stats{display:flex;justify-content:center;gap:48px;margin-bottom:32px}

.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:660px;margin:0 auto;justify-content:center}
.card-grid.hard{grid-template-columns:repeat(5,1fr);max-width:780px}
.diff-btns{display:flex;justify-content:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.diff-btn{font-family:'Luminari',serif;font-size:0.62rem;letter-spacing:0.28em;text-transform:uppercase;color:rgba(var(--gold-rgb,201,168,76),0.55);background:none;border:1px solid rgba(var(--gold-rgb,201,168,76),0.3);padding:7px 18px;cursor:pointer;transition:all 0.2s;min-height:44px}
.diff-btn.active{color:var(--gold,#c9a84c);border-color:var(--gold,#c9a84c);background:rgba(var(--gold-rgb,201,168,76),0.08)}
.diff-btn:hover{border-color:rgba(var(--gold-rgb,201,168,76),0.6);color:var(--gold,#c9a84c)}
.mem-card{aspect-ratio:3/4;cursor:pointer;perspective:900px;position:relative;touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent}
.mem-card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1)}
.mem-card.flipped .mem-card-inner,.mem-card.matched .mem-card-inner{transform:rotateY(180deg)}
.mem-front,.mem-back{position:absolute;inset:0;backface-visibility:hidden;border:1px solid rgba(var(--gold-rgb,201,168,76),0.18);overflow:hidden}
.mem-back{background:rgba(6,3,1,0.96);border:1px solid rgba(var(--gold-rgb,201,168,76),0.45);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:border-color 0.25s}
.mem-back-glyph{font-size:clamp(1.4rem,3vw,2rem);color:rgba(var(--gold-rgb,201,168,76),0.6);display:flex;align-items:center;justify-content:center;width:1.9em;height:1.9em;border:0.5px solid rgba(var(--gold-rgb,201,168,76),0.4);border-radius:50%;flex-shrink:0}
.mem-back-text{font-size:0.42rem;letter-spacing:0.4em;color:rgba(var(--gold-rgb,201,168,76),0.35);text-transform:uppercase}
.mem-card:not(.flipped):not(.matched):hover .mem-back{border-color:rgba(var(--gold-rgb,201,168,76),0.7)}
.mem-front{transform:rotateY(180deg)}
.mem-front img{width:100%;height:100%;object-fit:cover;display:block}
.mem-card.matched .mem-front{border-color:rgba(var(--gold-rgb,201,168,76),0.85);box-shadow:0 0 22px rgba(var(--gold-rgb,201,168,76),0.35),inset 0 0 14px rgba(var(--gold-rgb,201,168,76),0.07)}
.mem-card.matched .mem-front::after{content:'✦';position:absolute;bottom:5px;right:7px;font-size:0.75rem;color:rgba(var(--gold-rgb,201,168,76),0.7)}
/* Match pulse animation */
@keyframes matchPulse{0%{transform:rotateY(180deg) scale(1)}40%{transform:rotateY(180deg) scale(1.15)}100%{transform:rotateY(180deg) scale(1)}}
.mem-card.match-pulse .mem-card-inner{animation:matchPulse 0.3s ease-out forwards}
/* Mismatch shake animation */
@keyframes mismatchShake{0%{transform:rotateY(0deg) translateX(0)}20%{transform:rotateY(0deg) translateX(-6px)}40%{transform:rotateY(0deg) translateX(6px)}60%{transform:rotateY(0deg) translateX(-4px)}80%{transform:rotateY(0deg) translateX(4px)}100%{transform:rotateY(0deg) translateX(0)}}
.mem-card.mismatch-shake .mem-card-inner{animation:mismatchShake 0.35s ease-out forwards}

.mem-card.lock-pulse{animation:memLockPulse 0.7s ease-out infinite}

<div id="game-header">
  <a href="/arcade.html" id="back" data-native-nav>← Games</a>
  <div id="game-title"><span class="gt-line">Memory</span><span class="gt-line">Vault</span><span class="title-symbol">✦</span></div>

</div>

<div class="game-wrap">
  <div class="diff-btns">
    <button class="diff-btn active" data-diff="easy">Easy · 6 pairs</button>

    <button class="ctrl-btn primary" id="btn-restart">Shuffle & Restart</button>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-moves">0</div><div class="stat-label">Moves</div></div>

  </div>
  <div class="card-grid" id="grid"></div>
  <div class="controls">
    <button id="hint-btn">♦ HINT (costs 1 life)</button>
  </div>
</div>
<div id="flawless-banner"></div>

<div id="win-overlay">

  <div class="win-title">The Vault Opens</div>
  <p class="win-sub">All pairs found</p>
  <p class="win-stats-txt" id="win-stat-txt"></p>

];

/* ── Audio ── */
var _ac=null;
function getAC(){
  if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();
  if(_ac.state==='suspended')_ac.resume();
  return _ac;
}
function playTone(freq,dur,type,vol,delay){
  try{
    var c=getAC();var now=c.currentTime+(delay||0);
    var o=c.createOscillator();var g=c.createGain();
    o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0.001,now);
    g.gain.linearRampToValueAtTime(vol||0.3,now+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,now+dur);
    o.connect(g);g.connect(c.destination);
    o.start(now);o.stop(now+dur+0.05);
  }catch(e){}
}
function playFlipSound(){playTone(800,0.08,'sine',0.18);}
function playMatchSound(){
  playTone(440,0.12,'sine',0.22,0);
  playTone(660,0.12,'sine',0.22,0.12);
  playTone(880,0.14,'sine',0.22,0.24);
}
function playMismatchSound(){playTone(180,0.22,'triangle',0.28);}
function playLevelCompleteSound(){
  playTone(523,0.15,'sine',0.3,0);
  playTone(659,0.15,'sine',0.3,0.15);
  playTone(784,0.15,'sine',0.3,0.3);
  playTone(1047,0.25,'sine',0.3,0.45);
}
function playGameOverSound(){
  playTone(440,0.18,'sine',0.28,0);
  playTone(330,0.18,'sine',0.28,0.18);
  playTone(220,0.25,'sine',0.28,0.36);
}
function playHintSound(){
  playTone(600,0.06,'sine',0.15,0);
  playTone(750,0.06,'sine',0.12,0.07);
}

/* ── State ── */
var moves=0,pairs=0,secs=0,started=false,locked=false,first=null,second=null,ticker=null;
var mismatches=0,lives=3;
var hintTimer=null,lastMatchTime=0,hintUsedThisInterval=false;
var BEST_KEY='memoryBestTime';

function pad(n){return n<10?'0'+n:n}
function tick(){secs++;document.getElementById('s-time').textContent=Math.floor(secs/60)+':'+pad(secs%60)}
function upd(){var t=DIFF_PAIRS[DIFF];document.getElementById('s-moves').textContent=moves;document.getElementById('s-pairs').textContent=pairs+' / '+t}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

/* ── Hint system ── */
function resetHintTimer(){
  clearTimeout(hintTimer);
  hintUsedThisInterval=false;
  document.getElementById('hint-btn').style.display='none';
  hintTimer=setTimeout(function(){
    if(pairs<DIFF_PAIRS[DIFF]&&started){document.getElementById('hint-btn').style.display='inline-block';}
  },30000);
}

function doHint(){
  if(lives<=0||locked)return;
  var unmatched=[].slice.call(document.querySelectorAll('.mem-card:not(.matched)'));
  if(!unmatched.length)return;
  var idMap={};
  unmatched.forEach(function(c){var id=c.dataset.id;if(!idMap[id])idMap[id]=[];idMap[id].push(c);});
  var pairCards=null;
  Object.keys(idMap).forEach(function(id){if(idMap[id].length>=2&&!pairCards)pairCards=idMap[id].slice(0,2);});
  if(!pairCards)return;
  lives--;
  document.getElementById('hint-btn').style.display='none';
  hintUsedThisInterval=true;
  playHintSound();
  pairCards.forEach(function(c){c.classList.add('flipped','hint-flash');});
  setTimeout(function(){
    pairCards.forEach(function(c){c.classList.remove('flipped','hint-flash');});
    resetHintTimer();
  },700);
}

function build(){
  clearInterval(ticker);clearTimeout(hintTimer);
  moves=0;pairs=0;secs=0;started=false;locked=false;first=null;second=null;mismatches=0;lives=3;
  document.getElementById('s-time').textContent='0:00';
  upd();
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('hint-btn').style.display='none';
  var fb=document.getElementById('flawless-banner');if(fb)fb.style.display='none';
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  var total=DIFF_PAIRS[DIFF];
  // Update subtitle and grid columns
  var sub=document.getElementById('game-sub');
  if(sub)sub.textContent='Match the pix \u00b7 find all '+total+' lix';
  if(DIFF==='hard'){grid.classList.add('hard');}else{grid.classList.remove('hard');}
  // Fisher-Yates shuffle, pick first N unique photos
  var pool=ACTIVE_PHOTOS.slice();
  shuffle(pool);
  var selected=pool.slice(0,total);
  // Build deck: each photo appears twice, shuffle pairs
  var deck=[];
  selected.forEach(function(fn,i){
    var obj={id:'p'+i,src:'assets/photos/'+fn};
    deck.push(obj);deck.push({id:'p'+i,src:'assets/photos/'+fn});
  });
  shuffle(deck);
  function renderCards(){
    deck.forEach(function(item){
      var card=document.createElement('div');
      card.className='mem-card';
      card.dataset.id=item.id;
      card.innerHTML='<div class="mem-card-inner"><div class="mem-back"><div class="mem-back-glyph">\u2726</div><div class="mem-back-text">Jestamang</div></div><div class="mem-front"><img src="'+item.src+'" alt="" loading="eager" width="150" height="150"></div></div>';
      card.addEventListener('click',function(){flip(card);});
      grid.appendChild(card);
    });
  }
  renderCards();
}

function flip(card){
  if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  if(!started){started=true;ticker=setInterval(tick,1000);resetHintTimer();}
  playFlipSound();
  card.classList.add('flipped');
  if(!first){first=card;return;}
  second=card;locked=true;moves++;upd();
  if(first.dataset.id===second.dataset.id){
    var a=first,b=second;first=null;second=null;
    setTimeout(function(){
      a.classList.add('matched','match-pulse');b.classList.add('matched','match-pulse');
      setTimeout(function(){a.classList.remove('match-pulse');b.classList.remove('match-pulse');},350);
      playMatchSound();pairs++;upd();lastMatchTime=Date.now();resetHintTimer();locked=false;
      if(pairs===DIFF_PAIRS[DIFF])setTimeout(win,600);
    },200);
  } else {
    mismatches++;var a=first,b=second;first=null;second=null;
    a.classList.add('lock-pulse');b.classList.add('lock-pulse');
    var _lg=document.getElementById('grid');if(_lg)_lg.classList.add('is-locked');
    setTimeout(function(){
      a.classList.add('mismatch-shake');b.classList.add('mismatch-shake');playMismatchSound();
      setTimeout(function(){
        a.classList.remove('mismatch-shake','flipped','lock-pulse');b.classList.remove('mismatch-shake','flipped','lock-pulse');
        var _lg2=document.getElementById('grid');if(_lg2)_lg2.classList.remove('is-locked');
        locked=false;
      },450);
    },800);
  }
}

function win(){
  clearInterval(ticker);clearTimeout(hintTimer);
  var m=Math.floor(secs/60),s=secs%60;var timeStr=m+':'+pad(s);
  var bestTxt='';
  try{
    var prev=JSON.parse(localStorage.getItem(BEST_KEY)||'null');
    if(!prev||secs<prev.secs){localStorage.setItem(BEST_KEY,JSON.stringify({secs:secs,str:timeStr}));bestTxt='NEW BEST TIME!';}
    else{bestTxt='BEST: '+prev.str;}
  }catch(e){}
  document.getElementById('win-stat-txt').textContent=moves+' moves  \u00b7  '+timeStr;
  var bestEl=document.getElementById('win-best-txt');if(bestEl)bestEl.textContent=bestTxt;
  if(mismatches===0){
    showFlawless();playLevelCompleteSound();submitScore('memory-vault-'+DIFF,moves,true,null,{flawless:true});
    try{var _pbk='lbBest_memory-vault-'+DIFF;var _prev=JSON.parse(localStorage.getItem(_pbk)||'null');if(!_prev||moves<_prev.score){localStorage.setItem(_pbk,JSON.stringify({score:moves}));}}catch(e){}
  } else {
    playLevelCompleteSound();document.getElementById('win-overlay').classList.add('show');submitScore('memory-vault-'+DIFF,moves,true,null,{flawless:false});
    try{var _pbk='lbBest_memory-vault-'+DIFF;var _prev=JSON.parse(localStorage.getItem(_pbk)||'null');if(!_prev||moves<_prev.score){localStorage.setItem(_pbk,JSON.stringify({score:moves}));}}catch(e){}
  }
}

function showFlawless(){
  var fb=document.getElementById('flawless-banner');if(!fb)return;
  fb.textContent='FLAWLESS MEMORY \u2726';fb.style.display='block';
  setTimeout(function(){fb.style.display='none';document.getElementById('win-overlay').classList.add('show');},2200);
}

document.addEventListener('DOMContentLoaded',function(){
  var _btnRestart=document.getElementById('btn-restart');if(_btnRestart)_btnRestart.addEventListener('click',build);
  var _btnAgain=document.getElementById('btn-again');if(_btnAgain)_btnAgain.addEventListener('click',build);
  var _hintBtn=document.getElementById('hint-btn');if(_hintBtn)_hintBtn.addEventListener('click',doHint);
  document.querySelectorAll('.diff-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      DIFF=this.dataset.diff;
      document.querySelectorAll('.diff-btn').forEach(function(b){b.classList.remove('active');});
      this.classList.add('active');
      build();
    });
  });
  build();
});

/* ── Firestore photo pool loader (100ms × 80 tries) ── */
(function(){
  var _jt = 0, _jiv = setInterval(function(){
    if(window.jestaDB){
      clearInterval(_jiv);
      window.jestaDB.collection('photos').get().then(function(snap){
        var filenames=[];
        snap.forEach(function(doc){
          var g=doc.data();
          if(g.visible===false)return;
          (g.photos||[]).forEach(function(p){if(p.visible!==false&&p.filename)filenames.push(p.filename);});
        });
        if(filenames.length>10)ACTIVE_PHOTOS=filenames;
      }).catch(function(){});
    } else if(++_jt > 80){
      clearInterval(_jiv);
    }
  }, 100);
})();
</script>

<script>
/* LEADERBOARD SYSTEM */
(function(){
'use strict';
function _san(n){return String(n).replace(/[^a-zA-Z0-9 '\-\.]/g,'').trim().slice(0,20)||'Anonymous';}
function _esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function _fmtDate(ts){try{var d=ts&&ts.toDate?ts.toDate():new Date(ts);return(d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2);}catch(e){return '—';}}
function _getDb(){try{return window.jestaDB||(window.firebase&&window.firebase.apps&&window.firebase.apps.length&&window.firebase.firestore())||null;}catch(e){return null;}}
window.openLB=function(game,title,lowerBetter){
  var modal=document.getElementById('lb-modal');
  var list=document.getElementById('lb-list');
  document.getElementById('lb-title').textContent=title+' · Leaderboard';
  list.innerHTML='<div class="lb-loading">CONSULTING THE STARS...</div>';
  modal.classList.add('open');
  var db=_getDb();
  if(!db){list.innerHTML='<div class="lb-empty">The scrolls are unavailable.</div>';return;}
  db.collection('leaderboards').where('game','==',game).limit(50).get()
    .then(function(snap){
      if(snap.empty){
        list.innerHTML='<div class="lb-empty">BE THE FIRST TO MARK YOUR SCORE</div>';return;
      }
      var docs=snap.docs.map(function(d){return d.data();});
      docs.sort(function(a,b){
        var d=lowerBetter?(a.score-b.score):(b.score-a.score);
        if(d!==0)return d;
        var at=(a.timestamp&&a.timestamp.toMillis)?a.timestamp.toMillis():0;
        var bt=(b.timestamp&&b.timestamp.toMillis)?b.timestamp.toMillis():0;
        return at-bt;
      });
      var seen={},deduped=[];for(var _i=0;_i<docs.length;_i++){var _k=docs[_i].uid||docs[_i].name;if(!_k){deduped.push(docs[_i]);continue;}if(!seen[_k]){seen[_k]=true;deduped.push(docs[_i]);}}docs=deduped.slice(0,10);
      var html='<div class="lb-row lb-head-row"><span class="lb-rank">Rank</span><span class="lb-name">Name</span><span class="lb-score">Moves</span><span class="lb-date">Date</span></div>';
  docs.forEach(function(d,i){
        var rankDisp=i===0?'<span style="color:var(--gold,#c9a84c);font-size:1rem">'+JestaLeaderboard.SCROLL_RANK1_MARKER+'</span>':(i+1);
        html+='<div class="lb-row"><span class="lb-rank">'+rankDisp+'</span><span class="lb-name">'+JestaLeaderboard.scrollAvatar(d)+'<span class="lb-name-txt">'+_esc(d.name)+'</span>'+(d.flawless?'<span style="color:#02E127;font-size:0.7em;margin-left:4px">✦</span>':'')+'</span><span class="lb-score">'+JestaLeaderboard.formatScrollScore(d.score,'points')+'</span><span class="lb-date">'+JestaLeaderboard.formatScrollDate(d.timestamp)+'</span></div>';
      });
      list.innerHTML=html;
      JestaLeaderboard.lbFetchMissingAvatars(list);
    }).catch(function(){list.innerHTML='<div class="lb-empty">Scores temporarily unavailable.</div>';});
};
window.closeLB=function(){document.getElementById('lb-modal').classList.remove('open');};
document.addEventListener('keydown',function(e){if(e.key==='Escape'){window.closeLB();document.getElementById('lb-name-modal').classList.remove('open');}});
var _lbModal=document.getElementById('lb-modal');if(_lbModal)_lbModal.addEventListener('click',function(e){if(e.target===this)window.closeLB();});
window.submitScore=function(game,score,lowerBetter,cb,extra){
  function doSave(name){
    var db=_getDb();if(!db){if(cb)cb();return;}
    var _uid=null,_photo=null;try{var _cu=window.firebase&&window.firebase.auth&&window.firebase.auth().currentUser;if(_cu){_uid=_cu.uid||null;_photo=_cu.photoURL||null;}}catch(e){}
    var _rec={game:game,name:_san(name),score:score,uid:_uid,photoURL:_photo,timestamp:window.firebase.firestore.FieldValue.serverTimestamp()};
    if(extra){for(var _k in extra){if(Object.prototype.hasOwnProperty.call(extra,_k)&&_k!=='game'&&_k!=='score'&&_k!=='name'&&_k!=='uid'&&_k!=='photoURL'&&_k!=='timestamp')_rec[_k]=extra[_k];}}
    db.collection('leaderboards').add(_rec)
      .then(function(){if(cb)cb();}).catch(function(){if(cb)cb();});
  }
  try{var auth=window.firebase&&window.firebase.auth&&window.firebase.auth();if(auth&&auth.currentUser&&auth.currentUser.displayName){doSave(auth.currentUser.displayName);return;}}catch(e){}
  var nm=document.getElementById('lb-name-modal');var inp=document.getElementById('lb-name-inp');
  nm.classList.add('open');inp.value='';setTimeout(function(){inp.focus();},100);
  function doCancel(){nm.classList.remove('open');cleanup();if(cb)cb();}
  function doConfirm(){var n=inp.value.trim();if(!n){inp.focus();return;}nm.classList.remove('open');cleanup();doSave(n);}
  function cleanup(){var _lbc=document.getElementById('lb-name-confirm');if(_lbc)_lbc.onclick=null;var _lbcl=document.getElementById('lb-name-cancel');if(_lbcl)_lbcl.onclick=null;inp.onkeydown=null;}
  var _lbNameConfirm=document.getElementById('lb-name-confirm');if(_lbNameConfirm)_lbNameConfirm.onclick=doConfirm;
  var _lbNameCancel=document.getElementById('lb-name-cancel');if(_lbNameCancel)_lbNameCancel.onclick=doCancel;
  inp.onkeydown=function(e){if(e.key==='Enter')doConfirm();if(e.key==='Escape')doCancel();};
};
})();
</script>
