<style>
@font-face{font-family:'Luminari';src:url('../assets/fonts/Luminari.ttf') format('truetype');font-display:swap}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Luminari',serif;user-select:none;-webkit-user-select:none}
canvas{display:block;position:fixed;inset:0;touch-action:none}
#hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:5;font-size:clamp(1rem,4vw,1.6rem);letter-spacing:0.45em;color:rgba(201,168,76,0.85);text-shadow:0 0 16px rgba(201,168,76,0.5);pointer-events:none;display:none;text-transform:uppercase}
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;text-align:center;padding:24px}
.scr.off{display:none}
.eyebrow{font-size:clamp(0.58rem,1.8vw,0.78rem);letter-spacing:0.65em;color:rgba(201,168,76,0.35);text-transform:uppercase;margin-bottom:20px}
.big-title{font-size:clamp(3.5rem,14vw,9rem);letter-spacing:0.45em;color:#c9a84c;text-shadow:0 0 50px rgba(201,168,76,0.7),0 0 100px rgba(201,168,76,0.2);text-transform:uppercase;line-height:1;margin-bottom:14px}
.sub{font-size:clamp(0.68rem,2vw,0.88rem);letter-spacing:0.35em;color:rgba(255,255,255,0.32);text-transform:uppercase;margin-bottom:52px;line-height:2.1}
.btn{font-family:'Luminari',serif;font-size:clamp(0.78rem,2.5vw,0.95rem);letter-spacing:0.5em;text-transform:uppercase;color:#c9a84c;background:none;border:1px solid rgba(201,168,76,0.5);padding:15px 50px;cursor:pointer;transition:all 0.3s;min-height:52px}
.btn:hover,.btn:active{background:rgba(201,168,76,0.1);border-color:#c9a84c;box-shadow:0 0 28px rgba(201,168,76,0.2)}
.score-big{font-size:clamp(3rem,12vw,7rem);letter-spacing:0.3em;color:#c9a84c;text-shadow:0 0 40px rgba(201,168,76,0.7);margin-bottom:4px}
.score-lbl{font-size:clamp(0.62rem,1.8vw,0.78rem);letter-spacing:0.5em;color:rgba(255,255,255,0.28);text-transform:uppercase;margin-bottom:10px}
.best-lbl{font-size:clamp(0.6rem,1.6vw,0.75rem);letter-spacing:0.35em;color:rgba(255,255,255,0.2);text-transform:uppercase;margin-bottom:44px}
.ctrl-hint{font-size:0.66rem;letter-spacing:0.14em;color:rgba(255,255,255,0.16);text-transform:uppercase;margin-top:24px;line-height:2.2}
#back{position:fixed;top:12px;left:14px;z-index:30;font-family:'Luminari',serif;font-size:0.68rem;letter-spacing:0.18em;color:rgba(201,168,76,0.4);text-decoration:none;border:1px solid rgba(201,168,76,0.18);padding:7px 14px;background:rgba(0,0,0,0.6);transition:all 0.2s}
#back:hover{color:#c9a84c;border-color:rgba(201,168,76,0.5)}
</style>
</head>
<body>
<a href="../games.html" id="back">← Games</a>
<canvas id="c"></canvas>
<div id="hud"></div>

<div id="ss" class="scr">
  <div class="eyebrow">Jestamang Universe</div>
  <div class="big-title">The<br>Void</div>
  <div class="sub">Shapes descend from every edge<br>Survive as long as you can</div>
  <button class="btn" id="startBtn">Enter the Void</button>
  <div class="ctrl-hint">WASD · Arrow Keys · Touch</div>
</div>

<div id="os" class="scr off">
  <div class="eyebrow">You were consumed</div>
  <div class="score-big" id="finalScore">0.0</div>
  <div class="score-lbl">Seconds Survived</div>
  <div class="best-lbl" id="bestLbl"></div>
  <button class="btn" id="restartBtn">Descend Again</button>
</div>

<script>
const C = document.getElementById('c'), X = C.getContext('2d');
const HUD = document.getElementById('hud');
let W, H;
function resize() { W = C.width = window.innerWidth; H = C.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const PAL = { triangle:'#8800FF', ring:'#0099FF', hexagon:'#39FF14', diamond:'#FF1493', star:'#FF6600' };

let ST = 'start';
let player, trail, shapes, parts, keys, touch, t0, bgHue, spawnT, flashA;

function init() {
  player = { x: W/2, y: H/2, r: 12 };
  trail = []; shapes = []; parts = [];
  keys = {}; touch = { on: false, x: W/2, y: H/2 };
  t0 = performance.now(); bgHue = 220; spawnT = 0; flashA = 0;
  HUD.style.display = 'block';
}

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
C.addEventListener('touchstart', e => {
  e.preventDefault(); touch.on = true;
  touch.x = e.touches[0].clientX; touch.y = e.touches[0].clientY;
}, { passive: false });
C.addEventListener('touchmove', e => {
  e.preventDefault();
  touch.x = e.touches[0].clientX; touch.y = e.touches[0].clientY;
}, { passive: false });
C.addEventListener('touchend', e => { if (!e.touches.length) touch.on = false; }, { passive: false });

function spawnShape(sec) {
  const spd = 1.5 + Math.floor(sec / 15) * 0.45;
  const pool = ['triangle','ring','hexagon'];
  if (sec > 30) pool.push('diamond');
  if (sec > 55) pool.push('star');
  const type = pool[0 | Math.random() * pool.length];
  let x, y;
  const edge = 0 | Math.random() * 4;
  if (edge === 0) { x = Math.random() * W; y = -40; }
  else if (edge === 1) { x = W + 40; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + 40; }
  else { x = -40; y = Math.random() * H; }
  const tx = W/2 + (Math.random() - 0.5) * W * 0.4;
  const ty = H/2 + (Math.random() - 0.5) * H * 0.4;
  const d = Math.hypot(tx - x, ty - y);
  shapes.push({
    type, x, y, vx: (tx-x)/d*spd, vy: (ty-y)/d*spd,
    sz: 16 + Math.random() * 18, rot: Math.random() * 6.28,
    rs: (Math.random() - 0.5) * 0.09, t: 0, col: PAL[type]
  });
}

function poly(n, x, y, r, rot) {
  X.beginPath();
  for (let i = 0; i < n; i++) {
    const a = i/n * 6.283 - 1.5708 + rot;
    i === 0 ? X.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r)
            : X.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
  }
  X.closePath();
}

function drawShape(s) {
  const { type, x, y, sz, rot, t, col } = s;
  X.save();
  X.shadowColor = col; X.shadowBlur = 16; X.strokeStyle = col; X.lineWidth = 2.2;
  if (type === 'triangle') {
    const p = 1 + 0.15 * Math.sin(t * 0.05);
    poly(3, x, y, sz*p, rot); X.stroke(); X.fillStyle = col + '20'; X.fill();
  } else if (type === 'ring') {
    const r = sz * (1 + 0.22 * Math.sin(t * 0.04));
    X.beginPath(); X.arc(x, y, r, 0, 6.283); X.stroke();
    X.beginPath(); X.arc(x, y, r * 0.55, 0, 6.283); X.fillStyle = col + '28'; X.fill();
  } else if (type === 'hexagon') {
    const p = 1 + 0.18 * Math.sin(t * 0.06);
    poly(6, x, y, sz*p, rot); X.stroke(); X.fillStyle = col + '16'; X.fill();
  } else if (type === 'diamond') {
    X.translate(x, y); X.rotate(rot);
    X.beginPath(); X.moveTo(0,-sz); X.lineTo(sz*0.6,0); X.lineTo(0,sz); X.lineTo(-sz*0.6,0); X.closePath();
    X.stroke(); X.fillStyle = col + '1E'; X.fill();
  } else if (type === 'star') {
    const p = 1 + 0.1 * Math.sin(t * 0.07);
    X.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = i/10 * 6.283 - 1.5708 + rot;
      const r = i%2===0 ? sz*p : sz*0.42*p;
      i === 0 ? X.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r)
              : X.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
    }
    X.closePath(); X.stroke();
  }
  X.restore();
}

function collide() {
  for (const s of shapes) {
    const pulse = (s.type === 'ring') ? 1 + 0.22 * Math.sin(s.t * 0.04) : 1 + 0.18 * Math.sin(s.t * 0.05);
    if (Math.hypot(player.x - s.x, player.y - s.y) < player.r + s.sz * pulse * 0.74) return true;
  }
  return false;
}

function die() {
  ST = 'dying'; flashA = 1.0;
  const cols = ['#c9a84c','#8800FF','#0099FF','#39FF14','#FF1493','#fff','#FF6600'];
  for (let i = 0; i < 120; i++) {
    const a = Math.random() * 6.283, spd = 2 + Math.random() * 9;
    parts.push({
      x: player.x, y: player.y,
      vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life: 1, dec: 0.007 + Math.random() * 0.018,
      col: cols[0 | Math.random() * cols.length], r: 2 + Math.random() * 6
    });
  }
  const sec = ((performance.now() - t0) / 1000).toFixed(1);
  setTimeout(() => {
    ST = 'over';
    document.getElementById('finalScore').textContent = sec;
    const best = parseFloat(localStorage.getItem('void_best') || 0);
    const s = parseFloat(sec);
    if (s > best) {
      localStorage.setItem('void_best', sec);
      document.getElementById('bestLbl').textContent = '✦ New Record ✦';
    } else {
      document.getElementById('bestLbl').textContent = 'Best: ' + best.toFixed(1) + 's';
    }
    document.getElementById('os').classList.remove('off');
    HUD.style.display = 'none';
    shapes = []; trail = [];
  }, 1600);
}

bgHue = 200;
requestAnimationFrame(function loop(ts) {
  requestAnimationFrame(loop);
  bgHue = (bgHue + 0.04) % 360;

  const trailAlpha = (ST === 'playing' || ST === 'dying') ? 0.22 : 0.10;
  X.fillStyle = `hsla(${bgHue},38%,4%,${trailAlpha})`;
  X.fillRect(0, 0, W, H);

  if (ST === 'playing') {
    const sec = (ts - t0) / 1000;
    let dx = 0, dy = 0;
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
    if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
    if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
    if (touch.on) {
      const td = Math.hypot(touch.x - player.x, touch.y - player.y);
      if (td > 8) { dx = (touch.x - player.x)/td; dy = (touch.y - player.y)/td; }
    }
    if (dx && dy) { dx *= 0.707; dy *= 0.707; }
    player.x = Math.max(player.r, Math.min(W - player.r, player.x + dx * 4.2));
    player.y = Math.max(player.r, Math.min(H - player.r, player.y + dy * 4.2));

    trail.push({ x: player.x, y: player.y });
    if (trail.length > 30) trail.shift();

    spawnT++;
    const si = Math.max(36, 90 - Math.floor(sec / 9) * 7);
    if (spawnT >= si) { spawnShape(sec); spawnT = 0; }
    HUD.textContent = sec.toFixed(1) + 's';
  }

  // Trail
  for (let i = 0; i < trail.length; i++) {
    const a = i / trail.length;
    X.beginPath(); X.arc(trail[i].x, trail[i].y, player.r * a * 0.62, 0, 6.283);
    X.fillStyle = `rgba(201,168,76,${a * 0.28})`; X.fill();
  }

  // Shapes
  for (const s of shapes) { s.x += s.vx; s.y += s.vy; s.rot += s.rs; s.t++; drawShape(s); }
  for (let i = shapes.length - 1; i >= 0; i--) {
    const s = shapes[i];
    if (s.x < -200 || s.x > W+200 || s.y < -200 || s.y > H+200) shapes.splice(i, 1);
  }

  // Player orb
  if (ST === 'playing') {
    const g = X.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.r * 3.5);
    g.addColorStop(0, 'rgba(201,168,76,0.38)'); g.addColorStop(1, 'rgba(201,168,76,0)');
    X.beginPath(); X.arc(player.x, player.y, player.r * 3.5, 0, 6.283);
    X.fillStyle = g; X.fill();
    X.beginPath(); X.arc(player.x, player.y, player.r, 0, 6.283);
    X.fillStyle = '#c9a84c'; X.shadowColor = '#c9a84c'; X.shadowBlur = 22; X.fill(); X.shadowBlur = 0;
    if (collide()) die();
  }

  // Particles
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.97; p.vy *= 0.97; p.life -= p.dec;
    if (p.life <= 0) { parts.splice(i, 1); continue; }
    X.beginPath(); X.arc(p.x, p.y, p.r * p.life, 0, 6.283);
    X.globalAlpha = p.life; X.fillStyle = p.col; X.fill(); X.globalAlpha = 1;
  }

  // Death flash
  if (flashA > 0) {
    X.fillStyle = `rgba(255,255,255,${flashA})`; X.fillRect(0, 0, W, H);
    flashA = Math.max(0, flashA - 0.034);
  }
});

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('ss').classList.add('off');
  init(); ST = 'playing';
});
document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('os').classList.add('off');
  init(); ST = 'playing';
});
</script>
</body>
</html>
