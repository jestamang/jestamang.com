<body>
<a href="../games.html" id="back">← Games</a>
<canvas id="c"></canvas>
<div id="mob-ctrl">
  <button id="mob-left">◀</button>
  <button id="mob-fire">FIRE</button>
  <button id="mob-right">▶</button>
</div>

<div id="ss" class="scr">
  <div class="eyebrow">Jestamang Universe</div>
  <div class="big-title">Entity<br>Invaders</div>
  <div class="sub">Destroy the entities before they descend<br>3 lives · Survive the waves</div>
  <button class="btn" id="startBtn">Begin Invasion</button>
  <div class="ctrl-hint">← → Arrow Keys · Space to Fire · Touch Controls</div>
</div>

<div id="os" class="scr off">
  <div class="eyebrow">The entities prevailed</div>
  <div class="score-big" id="finalScore">0</div>
  <div class="score-lbl">Final Score</div>
  <div class="best-lbl" id="bestLbl"></div>
  <button class="btn" id="restartBtn">Invade Again</button>
</div>

<script>
const C = document.getElementById('c'), X = C.getContext('2d');
let W, H;
function resize() { W = C.width = window.innerWidth; H = C.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); if (ST === 'playing') buildGrid(); });

const ENTITIES = [
  'Jestamang','Ace of Chase','Alissa Orange',
  'Blue Jays','Cricket Om','Father P. Journee',
  'Israel','Kek-Buh','Ode to Bonnie',
  'The Perfect Trip','Venus & the Flytrap','NONS',
  'Porphigen','Austinich','Quarter Days',
  'Atlas is Alice','Hodge','Jonas Kyle','Mike 55','Mutt Tour','Colours'
];

const GLYPHS = ['✦','✶','◈','†','⊕','⊗','◉','✸'];
let ST = 'start';
let score, wave, lives, enemies, playerX, playerBullet, enemyBullets;
let keys = {}, fireHeld = false, fireCooldown = 0;
let stars = [], gridDir = 1, gridX = 0, gridY = 0, gridSpeed, gridDrop = 24;
let waveHue = 220, parts = [];

// ─── Stars ───────────────────────────────
function initStars() {
  stars = [];
  for (let i = 0; i < 90; i++) {
    stars.push({ x: Math.random()*W, y: Math.random()*H, r: 0.5+Math.random()*1.5, sp: 0.3+Math.random()*0.8 });
  }
}

// ─── Enemy grid ──────────────────────────
function buildGrid() {
  const COLS = 3;
  const margin = 24;
  const usableW = Math.min(W - margin*2, 780);
  const cellW = usableW / COLS;
  const cellH = 36;
  const startX = (W - usableW) / 2;
  enemies = [];
  for (let i = 0; i < ENTITIES.length; i++) {
    const row = Math.floor(i / COLS);
    const col = i % COLS;
    enemies.push({
      name: ENTITIES[i], alive: true, flash: 0,
      col, row, cellW, cellH,
      x: startX + col * cellW + cellW/2,
      y: 80 + row * (cellH + 8) + gridY,
      baseX: startX + col * cellW + cellW/2,
      baseY: 80 + row * (cellH + 8)
    });
  }
  gridX = 0;
}

function init() {
  score = 0; wave = 1; lives = 3;
  gridDir = 1; gridX = 0; gridY = 0; gridSpeed = 0.55;
  playerX = W / 2; playerBullet = null; enemyBullets = [];
  parts = []; fireCooldown = 0;
  initStars();
  buildGrid();
}

// ─── Controls ────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if (e.key === ' ') fireHeld = true;
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  if (e.key === ' ') fireHeld = false;
});

const mobLeft = document.getElementById('mob-left');
const mobRight = document.getElementById('mob-right');
const mobFire = document.getElementById('mob-fire');
mobLeft.addEventListener('touchstart',  e => { e.preventDefault(); keys['ArrowLeft'] = true; }, { passive:false });
mobLeft.addEventListener('touchend',    e => { e.preventDefault(); keys['ArrowLeft'] = false; }, { passive:false });
mobRight.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true; }, { passive:false });
mobRight.addEventListener('touchend',   e => { e.preventDefault(); keys['ArrowRight'] = false; }, { passive:false });
mobFire.addEventListener('touchstart',  e => { e.preventDefault(); fireHeld = true; }, { passive:false });
mobFire.addEventListener('touchend',    e => { e.preventDefault(); fireHeld = false; }, { passive:false });

// ─── Wavy bullet draw ─────────────────────
let wavePhase = 0;
function drawWavy(x, y) {
  X.beginPath();
  const len = 70;
  for (let i = 0; i <= len; i += 3) {
    const xi = x + Math.sin((y - i) * 0.28 + wavePhase) * 3.5;
    i === 0 ? X.moveTo(xi, y - i) : X.lineTo(xi, y - i);
  }
  X.strokeStyle = '#c9a84c';
  X.lineWidth = 2.5;
  X.shadowColor = '#c9a84c';
  X.shadowBlur = 10;
  X.stroke();
  X.shadowBlur = 0;
}

// ─── Ship draw ────────────────────────────
function drawShip(x, y) {
  X.save();
  X.translate(x, y);
  X.fillStyle = '#c9a84c';
  X.shadowColor = '#c9a84c';
  X.shadowBlur = 18;
  // Body
  X.beginPath();
  X.moveTo(0,-18); X.lineTo(12,8); X.lineTo(6,4); X.lineTo(0,12);
  X.lineTo(-6,4); X.lineTo(-12,8); X.closePath();
  X.fill();
  // Center gem
  X.beginPath(); X.arc(0,0,3,0,6.283); X.fillStyle='#fff'; X.fill();
  X.shadowBlur = 0;
  X.restore();
}

// ─── Spawn enemy bullet ───────────────────
let enemyFireTimer = 0;
function maybeFireEnemy(rate) {
  enemyFireTimer++;
  if (enemyFireTimer >= rate) {
    enemyFireTimer = 0;
    const alive = enemies.filter(e => e.alive);
    if (!alive.length) return;
    const src = alive[0 | Math.random() * alive.length];
    const glyph = GLYPHS[0 | Math.random() * GLYPHS.length];
    enemyBullets.push({ x: src.x, y: src.y, spd: 3.5 + wave * 0.4, glyph });
  }
}

// ─── Particles ────────────────────────────
function burst(x, y, col) {
  for (let i = 0; i < 18; i++) {
    const a = Math.random() * 6.283, spd = 1.5 + Math.random() * 4;
    parts.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, dec: 0.04, col, r: 1.5+Math.random()*3 });
  }
}

// ─── HUD ─────────────────────────────────
function drawHUD() {
  // Score
  X.font = `${clamp(0.75,2,1.1)*16}px 'Luminari'`;
  X.fillStyle = '#c9a84c';
  X.shadowColor = '#c9a84c'; X.shadowBlur = 10;
  const fs = clamp(13, 22, W * 0.014);
  X.font = fs + "px 'Luminari'";
  X.textAlign = 'right';
  X.fillText('Score: ' + score, W - 20, 30);
  // Lives
  X.textAlign = 'left';
  X.fillText('Lives: ' + '♥'.repeat(lives), 20, 30);
  // Wave
  X.textAlign = 'center';
  X.fillStyle = 'rgba(201,168,76,0.45)';
  X.shadowBlur = 0;
  X.font = (fs - 2) + "px 'Luminari'";
  X.fillText('Wave ' + wave, W/2, 30);
  X.shadowBlur = 0;
}

function clamp(a, b, v) { return Math.max(a, Math.min(b, v)); }

// ─── Main loop ───────────────────────────
let ST_playing = false;
requestAnimationFrame(function loop() {
  requestAnimationFrame(loop);

  // Background
  X.fillStyle = 'rgba(0,0,0,0.88)';
  X.fillRect(0, 0, W, H);

  // Stars
  X.fillStyle = 'rgba(255,255,255,0.7)';
  for (const s of stars) {
    s.y += s.sp; if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    X.beginPath(); X.arc(s.x, s.y, s.r, 0, 6.283); X.fill();
  }
  // Subtle wave hue background glow
  const grd = X.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, H*0.7);
  grd.addColorStop(0, `hsla(${waveHue},60%,12%,0.18)`);
  grd.addColorStop(1, 'transparent');
  X.fillStyle = grd; X.fillRect(0, 0, W, H);

  if (ST !== 'playing') return;

  wavePhase += 0.18;

  // Move player
  const pSpd = Math.min(W * 0.007, 6);
  if (keys['ArrowLeft'])  playerX = Math.max(18, playerX - pSpd);
  if (keys['ArrowRight']) playerX = Math.min(W - 18, playerX + pSpd);

  // Fire
  fireCooldown--;
  if ((fireHeld || keys[' ']) && fireCooldown <= 0 && !playerBullet) {
    playerBullet = { x: playerX, y: H - 80 };
    fireCooldown = 14;
  }

  // Move grid
  gridX += gridDir * gridSpeed;
  const alive = enemies.filter(e => e.alive);
  if (!alive.length) { nextWave(); return; }

  const leftmost = Math.min(...alive.map(e => e.baseX + gridX - e.cellW/2));
  const rightmost = Math.max(...alive.map(e => e.baseX + gridX + e.cellW/2));
  if (rightmost > W - 20 || leftmost < 20) {
    gridDir *= -1;
    gridY += gridDrop;
    // Check game over
    const bottommost = Math.max(...alive.map(e => e.baseY + gridY));
    if (bottommost > H - 130) { gameOver(); return; }
  }

  for (const e of enemies) { e.x = e.baseX + gridX; e.y = e.baseY + gridY; }

  // Draw enemies
  const fontSize = clamp(9, 13, alive[0]?.cellW * 0.09 || 11);
  X.font = `${fontSize}px 'Luminari'`;
  X.textAlign = 'center';
  X.textBaseline = 'middle';
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.flash > 0) {
      X.fillStyle = '#fff'; e.flash--;
    } else {
      X.fillStyle = '#c9a84c';
    }
    X.shadowColor = '#c9a84c'; X.shadowBlur = 8;
    const bx = e.x - e.cellW/2 + 4, by = e.y - e.cellH/2 + 4;
    const bw = e.cellW - 8, bh = e.cellH - 8;
    X.strokeStyle = e.flash > 0 ? 'rgba(255,255,255,0.7)' : 'rgba(201,168,76,0.3)';
    X.lineWidth = 1;
    X.strokeRect(bx, by, bw, bh);
    X.fillText(e.name, e.x, e.y, e.cellW - 12);
    X.shadowBlur = 0;
  }

  // Player bullet
  if (playerBullet) {
    playerBullet.y -= 10;
    drawWavy(playerBullet.x, playerBullet.y);
    if (playerBullet.y < -80) playerBullet = null;
    // Hit check
    if (playerBullet) {
      for (const e of enemies) {
        if (!e.alive) continue;
        if (Math.abs(playerBullet.x - e.x) < e.cellW/2 - 6 &&
            Math.abs(playerBullet.y - e.y) < e.cellH/2) {
          e.alive = false; e.flash = 6;
          burst(e.x, e.y, '#c9a84c');
          score += 10 * wave;
          playerBullet = null;
          break;
        }
      }
    }
  }

  // Enemy bullets
  maybeFireEnemy(Math.max(45, 90 - wave * 8));
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.y += b.spd;
    X.font = '16px serif'; X.fillStyle = '#FF3838';
    X.shadowColor = '#FF3838'; X.shadowBlur = 10;
    X.textAlign = 'center'; X.textBaseline = 'middle';
    X.fillText(b.glyph, b.x, b.y);
    X.shadowBlur = 0;
    if (b.y > H + 20) { enemyBullets.splice(i, 1); continue; }
    // Hit player
    if (Math.abs(b.x - playerX) < 16 && Math.abs(b.y - (H - 72)) < 20) {
      enemyBullets.splice(i, 1);
      lives--;
      burst(playerX, H - 72, '#FF3838');
      if (lives <= 0) { gameOver(); return; }
    }
  }

  // Draw ship
  drawShip(playerX, H - 72);

  // Particles
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i]; p.x += p.vx; p.y += p.vy; p.life -= p.dec;
    if (p.life <= 0) { parts.splice(i,1); continue; }
    X.beginPath(); X.arc(p.x, p.y, p.r*p.life, 0, 6.283);
    X.globalAlpha = p.life; X.fillStyle = p.col; X.fill(); X.globalAlpha = 1;
  }

  drawHUD();
});

function nextWave() {
  wave++;
  waveHue = (waveHue + 40) % 360;
  gridDir = 1; gridX = 0; gridY = 0;
  gridSpeed = 0.55 + wave * 0.22;
  enemyBullets = []; playerBullet = null;
  buildGrid();
}

function gameOver() {
  ST = 'over';
  document.getElementById('finalScore').textContent = score;
  const best = parseInt(localStorage.getItem('ei_best') || 0);
  if (score > best) {
    localStorage.setItem('ei_best', score);
    document.getElementById('bestLbl').textContent = '✦ New Record ✦';
  } else {
    document.getElementById('bestLbl').textContent = 'Best: ' + best;
  }
  document.getElementById('os').classList.remove('off');
}

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('ss').classList.add('off');
  init(); ST = 'playing';
});
document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('os').classList.add('off');
  init(); ST = 'playing';
