<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Cosmic Conductor — Jestamang</title>
<meta name="description" content="Play Cosmic Conductor — a rhythm arcade game from the Jestamang universe. Catch orbs and build combos to become the Grand Conductor.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://jestamang.com/games/cosmic-conductor.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Jestamang">
<meta property="og:title" content="Cosmic Conductor — Jestamang">
<meta property="og:description" content="Play Cosmic Conductor — a rhythm arcade game from the Jestamang universe. Catch orbs and build combos to become the Grand Conductor.">
<meta property="og:image" content="https://jestamang.com/assets/homepage/jestamang-badge.png">
<meta property="og:url" content="https://jestamang.com/games/cosmic-conductor.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Cosmic Conductor — Jestamang">
<meta name="twitter:description" content="Play Cosmic Conductor — a rhythm arcade game from the Jestamang universe. Catch orbs and build combos to become the Grand Conductor.">
<meta name="twitter:image" content="https://jestamang.com/assets/homepage/jestamang-badge.png">
<style>
@font-face{font-family:'Luminari';src:url('../assets/fonts/Luminari.ttf') format('truetype');font-display:swap}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Luminari',serif;user-select:none;-webkit-user-select:none}
canvas{display:block;position:fixed;inset:0;touch-action:none}
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;text-align:center;padding:24px;background:rgba(0,0,0,0.9)}
.scr.off{display:none}
.eyebrow{font-size:clamp(0.58rem,1.8vw,0.78rem);letter-spacing:0.65em;color:rgba(201,168,76,0.35);text-transform:uppercase;margin-bottom:16px}
.big-title{font-size:clamp(2rem,8vw,5.5rem);letter-spacing:0.4em;color:#c9a84c;text-shadow:0 0 40px rgba(201,168,76,0.7);text-transform:uppercase;line-height:1.15;margin-bottom:12px}
.sub{font-size:clamp(0.68rem,2vw,0.85rem);letter-spacing:0.3em;color:rgba(255,255,255,0.32);text-transform:uppercase;margin-bottom:44px;line-height:2.1}
.btn{font-family:'Luminari',serif;font-size:clamp(0.78rem,2.5vw,0.95rem);letter-spacing:0.5em;text-transform:uppercase;color:#c9a84c;background:none;border:1px solid rgba(201,168,76,0.5);padding:15px 50px;cursor:pointer;transition:all 0.3s;min-height:52px}
.btn:hover,.btn:active{background:rgba(201,168,76,0.1);border-color:#c9a84c;box-shadow:0 0 24px rgba(201,168,76,0.2)}
.score-big{font-size:clamp(2.5rem,10vw,6rem);letter-spacing:0.3em;color:#c9a84c;text-shadow:0 0 40px rgba(201,168,76,0.7);margin-bottom:4px}
.score-lbl{font-size:0.75rem;letter-spacing:0.4em;color:rgba(255,255,255,0.28);text-transform:uppercase;margin-bottom:8px}
.best-lbl{font-size:0.68rem;letter-spacing:0.3em;color:rgba(255,255,255,0.2);text-transform:uppercase;margin-bottom:10px}
.rank-lbl{font-size:0.78rem;letter-spacing:0.25em;color:rgba(201,168,76,0.55);text-transform:uppercase;margin-bottom:40px}
.ctrl-hint{font-size:0.64rem;letter-spacing:0.14em;color:rgba(255,255,255,0.16);text-transform:uppercase;margin-top:24px;line-height:2.2}
#back{position:fixed;top:12px;left:14px;z-index:30;font-family:'Luminari',serif;font-size:0.68rem;letter-spacing:0.18em;color:rgba(201,168,76,0.4);text-decoration:none;border:1px solid rgba(201,168,76,0.18);padding:7px 14px;background:rgba(0,0,0,0.7);transition:all 0.2s}
#back:hover{color:#c9a84c;border-color:rgba(201,168,76,0.5)}
/* Touch zones */
#touch-zones{display:none;position:fixed;bottom:0;left:0;right:0;z-index:5;height:20vh;pointer-events:none}
.tz{position:absolute;bottom:0;height:100%;pointer-events:all;background:rgba(201,168,76,0.04);border-top:1px solid rgba(201,168,76,0.15);display:flex;align-items:center;justify-content:center;font-family:'Luminari',serif;font-size:clamp(1rem,4vw,1.6rem);letter-spacing:0.2em;color:rgba(201,168,76,0.3);transition:background 0.08s;-webkit-tap-highlight-color:transparent}
.tz.active{background:rgba(201,168,76,0.18)!important}
#tz-a{left:0;width:25%}#tz-s{left:25%;width:25%}
#tz-d{left:50%;width:25%}#tz-f{left:75%;width:25%}
@media (max-width:900px){#touch-zones{display:block}}
</style>
</head>
<body>
<a href="../games.html" id="back">← Games</a>
<canvas id="c"></canvas>
<div id="touch-zones">
  <div class="tz" id="tz-a">A</div>
  <div class="tz" id="tz-s">S</div>
  <div class="tz" id="tz-d">D</div>
  <div class="tz" id="tz-f">F</div>
</div>

<div id="ss" class="scr">
  <div class="eyebrow">Jestamang Universe</div>
  <div class="big-title">Cosmic<br>Conductor</div>
  <div class="sub">Hit the orbs as they reach the gold line<br>Perfect timing · Build your combo</div>
  <button class="btn" id="startBtn">Take the Stage</button>
  <div class="ctrl-hint">A · S · D · F Keys &nbsp;·&nbsp; Touch the Zones</div>
</div>

<div id="os" class="scr off">
  <div class="eyebrow">The music fades</div>
  <div class="score-big" id="finalScore">0</div>
  <div class="score-lbl">Final Score</div>
  <div class="best-lbl" id="bestLbl"></div>
  <div class="rank-lbl" id="rankLbl"></div>
  <button class="btn" id="restartBtn">Conduct Again</button>
</div>

<script>
const C = document.getElementById('c'), X = C.getContext('2d');
let W, H;
function resize() { W = C.width = window.innerWidth; H = C.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ─── Constants ───────────────────────────
const PERFECT_WINDOW = 18; // px from target line
const GOOD_WINDOW    = 36;
const LANE_KEYS = ['a','s','d','f'];
const LANE_COLORS = ['#8800FF','#0099FF','#39FF14','#FF1493'];
const ORB_R = 18;

// ─── State ───────────────────────────────
let ST = 'start';
let score, combo, maxCombo, health, orbs, effects, stars, nebulaHue;
let t0, nextOrbTime, orbSpeed, orbs_per_beat, beatInterval;
let laneActive = [false,false,false,false];
let laneFlash = [0,0,0,0];
let keyDown = {};

// ─── Target line Y ───────────────────────
function targetY() { return H * 0.80; }

// ─── Init ────────────────────────────────
function init() {
  score = 0; combo = 0; maxCombo = 0; health = 5;
  orbs = []; effects = []; laneFlash = [0,0,0,0]; laneActive = [false,false,false,false];
  nebulaHue = 260;
  t0 = performance.now();
  nextOrbTime = t0 + 1200;
  beatInterval = 640; orbSpeed = H * 0.0034;
  initStars();
}

function initStars() {
  stars = [];
  for (let i = 0; i < 110; i++) {
    stars.push({ x: Math.random()*W, y: Math.random()*H, r: 0.4+Math.random()*1.4, sp: 0.1+Math.random()*0.3, alpha: 0.3+Math.random()*0.7 });
  }
}

// ─── Controls ────────────────────────────
window.addEventListener('keydown', e => {
  if (keyDown[e.key]) return;
  keyDown[e.key] = true;
  const li = LANE_KEYS.indexOf(e.key.toLowerCase());
  if (li !== -1 && ST === 'playing') { laneActive[li] = true; pressLane(li); }
});
window.addEventListener('keyup', e => {
  keyDown[e.key] = false;
  const li = LANE_KEYS.indexOf(e.key.toLowerCase());
  if (li !== -1) laneActive[li] = false;
});

// Touch zones
['a','s','d','f'].forEach((k, i) => {
  const el = document.getElementById('tz-' + k);
  el.addEventListener('touchstart', e => {
    e.preventDefault(); laneActive[i] = true; el.classList.add('active');
    if (ST === 'playing') pressLane(i);
  }, { passive:false });
  el.addEventListener('touchend', e => {
    e.preventDefault(); laneActive[i] = false; el.classList.remove('active');
  }, { passive:false });
});

// ─── Spawn orbs ──────────────────────────
function scheduleOrb() {
  const now = performance.now();
  if (now < nextOrbTime) return;
  const elapsed = (now - t0) / 1000;
  // Scale difficulty
  beatInterval = Math.max(260, 640 - Math.floor(elapsed / 20) * 55);
  orbSpeed = H * (0.0034 + Math.floor(elapsed / 30) * 0.0006);
  // Spawn 1 orb, chance of 2 after 30s, chance of 3 after 60s
  const lanePool = [0,1,2,3];
  const count = elapsed > 60 && Math.random() < 0.25 ? 3 :
                elapsed > 30 && Math.random() < 0.3 ? 2 : 1;
  const shuffled = lanePool.sort(() => Math.random() - 0.5).slice(0, count);
  for (const lane of shuffled) {
    const travelMs = (targetY() - 0) / orbSpeed;
    orbs.push({ lane, y: -ORB_R, targetTime: now + travelMs, hit: null, alpha: 1 });
  }
  nextOrbTime = now + beatInterval;
}

// ─── Press lane ──────────────────────────
function pressLane(li) {
  laneFlash[li] = 12;
  const laneOrbs = orbs.filter(o => o.lane === li && !o.hit);
  if (!laneOrbs.length) return;
  // Find closest to target line
  const tY = targetY();
  const closest = laneOrbs.reduce((a, b) => Math.abs(a.y - tY) < Math.abs(b.y - tY) ? a : b);
  const dist = Math.abs(closest.y - tY);
  if (dist <= PERFECT_WINDOW) {
    closest.hit = 'perfect';
    combo++; maxCombo = Math.max(maxCombo, combo);
    const mult = Math.min(8, 1 + Math.floor(combo / 5));
    score += 100 * mult;
    spawnEffect(closest.lane, 'PERFECT', '#c9a84c', combo >= 5 ? '✦ x'+mult : '');
    nebulaHue = (nebulaHue + 20) % 360;
  } else if (dist <= GOOD_WINDOW) {
    closest.hit = 'good';
    combo++; maxCombo = Math.max(maxCombo, combo);
    const mult = Math.min(8, 1 + Math.floor(combo / 5));
    score += 50 * mult;
    spawnEffect(closest.lane, 'GOOD', '#aaaaff', '');
  }
}

// ─── Effects ─────────────────────────────
function spawnEffect(lane, text, col, sub) {
  const laneW = W / 4;
  const x = laneW * lane + laneW / 2;
  effects.push({ x, y: targetY() - 20, text, sub, col, life: 1, dec: 0.035 });
}

// ─── Draw helpers ─────────────────────────
function getLaneX(lane) {
  return (W / 4) * lane + (W / 4) / 2;
}

function drawLanes() {
  const laneW = W / 4;
  for (let i = 0; i < 4; i++) {
    const x = laneW * i;
    const active = laneFlash[i] > 0;
    X.fillStyle = active ? `rgba(201,168,76,0.06)` : `rgba(255,255,255,0.015)`;
    X.fillRect(x + 1, 0, laneW - 2, H);
    X.strokeStyle = active ? 'rgba(201,168,76,0.22)' : 'rgba(255,255,255,0.06)';
    X.lineWidth = 1;
    X.strokeRect(x + 1, 0, laneW - 2, H);
    // Key label
    const ky = H * (window.innerWidth <= 900 ? 0.76 : 0.78);
    X.font = `clamp(12px, 2vw, 18px)`;
    const fs = Math.max(12, Math.min(20, W * 0.013));
    X.font = fs + "px 'Luminari'";
    X.textAlign = 'center';
    X.fillStyle = laneFlash[i] > 0 ? 'rgba(201,168,76,0.85)' : 'rgba(201,168,76,0.3)';
    X.fillText(LANE_KEYS[i].toUpperCase(), getLaneX(i), ky);
    if (laneFlash[i] > 0) laneFlash[i]--;
  }
}

function drawTargetLine() {
  const tY = targetY();
  const grad = X.createLinearGradient(0, tY, W, tY);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(0.2, 'rgba(201,168,76,0.7)');
  grad.addColorStop(0.5, 'rgba(201,168,76,1)');
  grad.addColorStop(0.8, 'rgba(201,168,76,0.7)');
  grad.addColorStop(1, 'transparent');
  X.beginPath(); X.moveTo(0, tY); X.lineTo(W, tY);
  X.strokeStyle = grad; X.lineWidth = 3;
  X.shadowColor = '#c9a84c'; X.shadowBlur = 16; X.stroke(); X.shadowBlur = 0;
  // Hit flash zones
  for (let i = 0; i < 4; i++) {
    if (laneFlash[i] > 0) {
      const laneW = W / 4;
      X.fillStyle = `rgba(201,168,76,${laneFlash[i] / 12 * 0.4})`;
      X.fillRect(laneW * i + 2, tY - 14, laneW - 4, 28);
    }
  }
}

function drawOrbs() {
  const tY = targetY();
  for (const o of orbs) {
    if (o.hit) continue;
    const x = getLaneX(o.lane);
    const dist = Math.abs(o.y - tY);
    const inPerfect = dist <= PERFECT_WINDOW;
    const inGood    = dist <= GOOD_WINDOW;
    const glowR = inPerfect ? 28 : inGood ? 22 : 16;
    const glowA = inPerfect ? 0.55 : inGood ? 0.35 : 0.18;
    // Glow
    const g = X.createRadialGradient(x, o.y, 0, x, o.y, glowR + ORB_R);
    g.addColorStop(0, `rgba(201,168,76,${glowA})`);
    g.addColorStop(1, 'transparent');
    X.beginPath(); X.arc(x, o.y, glowR + ORB_R, 0, 6.283); X.fillStyle = g; X.fill();
    // Core
    X.beginPath(); X.arc(x, o.y, ORB_R, 0, 6.283);
    X.fillStyle = inPerfect ? '#ffe566' : inGood ? '#c9a84c' : LANE_COLORS[o.lane] + 'cc';
    X.shadowColor = inPerfect ? '#ffe566' : '#c9a84c';
    X.shadowBlur = inPerfect ? 24 : 14;
    X.fill(); X.shadowBlur = 0;
    // Ring
    X.beginPath(); X.arc(x, o.y, ORB_R + 4, 0, 6.283);
    X.strokeStyle = inPerfect ? 'rgba(255,229,102,0.6)' : 'rgba(201,168,76,0.35)';
    X.lineWidth = 1.5; X.stroke();
  }
}

function drawEffects() {
  for (const e of effects) {
    X.globalAlpha = e.life;
    X.textAlign = 'center';
    const fs = Math.max(14, Math.min(22, W * 0.018));
    X.font = `bold ${fs}px 'Luminari'`;
    X.fillStyle = e.col;
    X.shadowColor = e.col; X.shadowBlur = 16;
    X.fillText(e.text, e.x, e.y);
    if (e.sub) {
      X.font = (fs - 4) + "px 'Luminari'";
      X.fillText(e.sub, e.x, e.y + fs + 2);
    }
    X.shadowBlur = 0; X.globalAlpha = 1;
    e.y -= 1.2; e.life -= e.dec;
  }
  for (let i = effects.length - 1; i >= 0; i--) {
    if (effects[i].life <= 0) effects.splice(i, 1);
  }
}

function drawHealth() {
  const fs = Math.max(14, Math.min(22, W * 0.018));
  X.font = fs + "px 'Luminari'";
  X.textAlign = 'right';
  for (let i = 0; i < 5; i++) {
    X.fillStyle = i < health ? '#c9a84c' : 'rgba(255,255,255,0.12)';
    X.shadowColor = i < health ? '#c9a84c' : 'none';
    X.shadowBlur = i < health ? 8 : 0;
    X.fillText('★', W - 12 - (4 - i) * (fs + 4), 34);
  }
  X.shadowBlur = 0;
}

function drawHUD() {
  const fs = Math.max(12, Math.min(20, W * 0.014));
  X.font = fs + "px 'Luminari'"; X.textAlign = 'left';
  X.fillStyle = 'rgba(201,168,76,0.85)'; X.shadowColor = '#c9a84c'; X.shadowBlur = 10;
  X.fillText(score.toLocaleString(), 18, 34);
  X.shadowBlur = 0;
  if (combo >= 2) {
    X.font = (fs - 2) + "px 'Luminari'"; X.textAlign = 'center';
    X.fillStyle = `hsla(${(nebulaHue + 60) % 360},90%,70%,0.9)`;
    X.fillText(combo + 'x COMBO', W/2, 34);
  }
  drawHealth();
}

// ─── Loop ────────────────────────────────
requestAnimationFrame(function loop(ts) {
  requestAnimationFrame(loop);

  // Background
  X.fillStyle = 'rgba(0,2,8,0.9)';
  X.fillRect(0, 0, W, H);

  // Nebula
  const ng = X.createRadialGradient(W/2, H/2, 0, W/2, H/2, H*0.75);
  ng.addColorStop(0, `hsla(${nebulaHue},50%,8%,${0.1 + Math.min(combo*0.015, 0.3)})`);
  ng.addColorStop(1, 'transparent');
  X.fillStyle = ng; X.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    s.y += s.sp; if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
    X.beginPath(); X.arc(s.x, s.y, s.r, 0, 6.283);
    X.fillStyle = `rgba(255,255,255,${s.alpha * 0.75})`; X.fill();
  }

  if (ST !== 'playing') return;

  const elapsed = (ts - t0) / 1000;

  // Spawn orbs
  scheduleOrb();

  // Move orbs
  const tY = targetY();
  for (const o of orbs) {
    if (!o.hit) o.y += orbSpeed * 60 / 60;
  }

  // Miss check: orbs past target line + grace
  for (let i = orbs.length - 1; i >= 0; i--) {
    const o = orbs[i];
    if (o.hit) {
      o.alpha -= 0.1; if (o.alpha <= 0) orbs.splice(i, 1);
    } else if (o.y > tY + GOOD_WINDOW + 10) {
      // Missed
      combo = 0;
      health--;
      spawnEffect(o.lane, 'MISS', '#FF3838', '');
      orbs.splice(i, 1);
      if (health <= 0) { gameOver(elapsed); return; }
    }
  }

  drawLanes();
  drawTargetLine();
  drawOrbs();
  drawEffects();
  drawHUD();
});

function gameOver(elapsed) {
  ST = 'over';
  document.getElementById('finalScore').textContent = score.toLocaleString();
  const best = parseInt(localStorage.getItem('cc_best') || 0);
  if (score > best) {
    localStorage.setItem('cc_best', score);
    document.getElementById('bestLbl').textContent = '✦ New Record ✦';
  } else {
    document.getElementById('bestLbl').textContent = 'Best: ' + best.toLocaleString();
  }
  const rank = score >= 50000 ? 'Grand Conductor' : score >= 20000 ? 'Celestial' : score >= 8000 ? 'Rising Star' : 'Apprentice';
  document.getElementById('rankLbl').textContent = rank + ' · ' + maxCombo + 'x max combo';
  document.getElementById('os').classList.remove('off');
}

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('ss').classList.add('off');
  init(); ST = 'playing';
});
document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('os').classList.add('off');
  init(); ST = 'playing';
});
</script>
</body>
