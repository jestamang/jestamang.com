<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You Are Lost — Jestamang</title>
<script>
(function(){
  var path = window.location.pathname.toLowerCase().replace(/^\//, '').replace(/\/?(index\.html)?$/, '');
  var map = {
    'albums':'albums.html','videos':'videos.html','entities':'entities.html',
    'lyrics':'lyrics.html','merch':'merch.html','photos':'photos.html',
    'shows':'shows.html','blog':'blog.html','games':'games.html',
    'email':'email.html','members':'members.html','login':'login.html',
    'profile':'profile.html','arcade':'arcade.html','comix':'comix.html',
    'children':'entities.html','cartoons':'comix.html',
    'nons':'albums.html#nons','quarter-days':'albums.html#quarter-days',
    '2k2323':'albums.html#2k2323','2k2123':'albums.html#2k2123'
  };
  var dest = map[path];
  if (dest) { window.location.replace(dest); }
})();
</script>
<link rel="icon" type="image/png" href="assets/homepage/logo%20png.png">
<link rel="apple-touch-icon" href="assets/homepage/logo%20png.png">
<meta name="robots" content="noindex">
<style>
@font-face { font-family: 'Luminari'; src: url('assets/fonts/Luminari.ttf') format('truetype'); }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Luminari', serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 35%,rgba(0,0,0,0.05) 0%,rgba(0,0,0,0.75) 100%);
  z-index: 1;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 30vh;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
  z-index: 1;
  pointer-events: none;
}
video#jt-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: -1;
  pointer-events: none;
}
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px 24px;
  max-width: 600px;
}
.ornament {
  font-size: 1.4rem;
  color: rgba(201,168,76,0.5);
  letter-spacing: 0.6em;
  margin-bottom: 32px;
  display: block;
}
.error-code {
  font-size: clamp(5rem, 20vw, 10rem);
  letter-spacing: 0.15em;
  color: rgba(201,168,76,0.15);
  line-height: 1;
  margin-bottom: 8px;
  text-shadow: 0 0 80px rgba(201,168,76,0.1);
}
h1 {
  font-size: clamp(2.2rem, 5.5vw, 3.6rem);
  letter-spacing: 0.45em;
  text-transform: uppercase;
  color: #c9a84c;
  text-shadow: 0 0 40px rgba(201,168,76,0.4), 0 0 80px rgba(201,168,76,0.15);
  margin-bottom: 28px;
}
.rule {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: rgba(201,168,76,0.4);
  font-size: 0.9rem;
  letter-spacing: 0.3em;
  margin-bottom: 28px;
}
.rule::before, .rule::after {
  content: '';
  display: block;
  width: 60px;
  height: 1px;
  background: rgba(201,168,76,0.3);
}
.narrator {
  font-style: italic;
  font-size: clamp(0.85rem, 2.5vw, 1.05rem);
  color: rgba(255,255,255,0.55);
  line-height: 1.8;
  letter-spacing: 0.06em;
  margin-bottom: 48px;
  padding: 0 12px;
}
.home-link {
  display: inline-block;
  font-family: 'Luminari', serif;
  font-size: 0.78rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: #000;
  background: #c9a84c;
  text-decoration: none;
  padding: 14px 36px;
  transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
}
.home-link:hover {
  background: #e0bb60;
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(201,168,76,0.35);
}
@media (max-width: 768px) {
  body, .bg-wrap { background-attachment: scroll !important; }
  #jt-bg { position: fixed !important; object-position: center top; }
  h1 { font-size: clamp(1.7rem, 7vw, 2.4rem); }
  .container { padding: 70px 24px 40px; }
}
</style>
</head>
<body>
<img id="jt-bg" src="assets/homepage/background/Jesta background.jpg" alt="" aria-hidden="true" style="position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;pointer-events:none;opacity:0.72">

<div class="container">
  <span class="ornament">✦ ✦ ✦</span>
  <div class="error-code">404</div>
  <h1>You Are Lost</h1>
  <div class="rule">✦</div>
  <p class="narrator">
    This page does not exist in the Jestamang universe.<br>
    Return to where you came from.
  </p>
  <a href="index.html" class="home-link">Return Home</a>
</div>
</body>
</html>
