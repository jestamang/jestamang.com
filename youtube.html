<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Opening YouTube…</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background:#000; color:#c9a84c; font-family:Georgia,serif; text-align:center; padding:40vh 20px 0; margin:0; }
</style>
</head>
<body>
<p>Opening YouTube…</p>
<script>
(function(){
  var CHANNEL = '@jestamang';
  var isChannelId = CHANNEL.indexOf('UC') === 0 && CHANNEL.length > 20;
  var webUrl = isChannelId
    ? 'https://www.youtube.com/channel/' + CHANNEL
    : 'https://www.youtube.com/' + (CHANNEL.charAt(0) === '@' ? CHANNEL : '@' + CHANNEL);
  var appUrl = isChannelId
    ? 'youtube://www.youtube.com/channel/' + CHANNEL
    : 'youtube://www.youtube.com/' + (CHANNEL.charAt(0) === '@' ? CHANNEL : '@' + CHANNEL);
  var fallbackTimer = setTimeout(function(){
    window.location.href = webUrl;
  }, 1500);
  window.addEventListener('pagehide', function(){ clearTimeout(fallbackTimer); });
  window.addEventListener('blur',     function(){ clearTimeout(fallbackTimer); });
  window.location.href = appUrl;
})();
</script>
</body>
</html>
