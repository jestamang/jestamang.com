<script>
(function(){
  function updateHomeLogin(user){
    var desktop=document.getElementById('hp-login-desktop');
    var mobile=document.getElementById('hp-login-mobile');
    [desktop,mobile].forEach(function(el){
      if(!el)return;
      var label=el.querySelector('.nav-label');
      if(user){el.href='profile.html';if(label)label.textContent='Profile';}
      else{el.href='login.html';if(label)label.textContent='Login';}
    });
  }
  function initHomeAuth(){
    if(window.jestaAuth){window.jestaAuth.onAuthStateChanged(updateHomeLogin);}
    else{setTimeout(initHomeAuth,200);}
  }
  setTimeout(initHomeAuth,300);
})();
</script>
