@keyframes ring-pulse {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.94); }
  25%  { opacity: 1; }
  70%  { opacity: 0.4; }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1.06); }

<script>
(function(){
  try {
    var charts = JSON.parse(localStorage.getItem('jestaCharts') || '[]');
    if (!charts || charts.length === 0) return;

    // Sort by savedAt descending to get most recent first
    charts.sort(function(a, b){ return (b.savedAt||'').localeCompare(a.savedAt||''); });

    var container = document.getElementById('offline-chart');
    var body = document.getElementById('oc-body');
    if (!container || !body) return;

    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmtDate(s){
      try{ var d=new Date(s); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }catch(e){ return s; }
    }

    if (charts.length === 1) {
      // Single chart — show details
      var c = charts[0];
      var savedDate = c.savedAt ? fmtDate(c.savedAt) : '';
      body.innerHTML =
        '<div class="oc-chart-name">' + esc(c.name || 'My Chart') + '</div>' +
        '<div class="oc-birth-meta">' +
          esc(c.birthDate || '') +
          (c.birthTime ? ' &nbsp;&middot;&nbsp; ' + esc(c.birthTime) : '') +
          (c.birthPlace ? '<br>' + esc(c.birthPlace) : '') +
        '</div>' +
        (savedDate ? '<div class="oc-saved-at">Sealed ' + esc(savedDate) + '</div>' : '');
    } else {
      // Multiple charts — list them
      var html = '<div class="oc-divider">&#10022; ' + charts.length + ' Charts Sealed &#10022;</div><ul class="oc-list">';
      for (var i = 0; i < Math.min(charts.length, 5); i++) {
        var c = charts[i];
        html += '<li>' +
          '<span class="oc-chart-num">' + (i+1) + '</span>' +
          '<span class="oc-chart-name-tag">' + esc(c.name || 'My Chart') + '</span>' +
          '<span style="color:rgba(255,255,255,0.28);font-size:0.62rem;">' + esc(c.birthDate || '') + '</span>' +
          '</li>';
      }
      if (charts.length > 5) {
        html += '<li style="justify-content:center;color:rgba(201,168,76,0.3);font-size:0.6rem;letter-spacing:0.1em;">+ ' + (charts.length - 5) + ' more</li>';
      }
      html += '</ul>';
      body.innerHTML = html;
    }

    container.style.display = 'block';
  } catch(e) {}
})();
</script>
